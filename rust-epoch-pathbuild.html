<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>末日锈纪:筑路求生 V3.1</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html,body{width:100%;height:100%;overflow:hidden;background:#0a0a12}
        body{overflow:hidden;user-select:none;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif}
        #c{display:block;touch-action:none;width:100%!important;height:100%!important}
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
        .modal-box{background:#1a1a2e;border-radius:20px;padding:28px 32px;text-align:center;width:100%;max-width:300px;border:1px solid rgba(255,215,0,.3)}
        .modal-box.fail{border-color:rgba(255,68,68,.3)}
        .modal-box h2{color:#ffd700;font-size:20px;margin-bottom:8px}
        .modal-box.fail h2{color:#ff6b6b}
        .modal-box p{color:#8a8a9a;font-size:14px;margin-bottom:18px}
        .modal-box button{width:100%;padding:12px 24px;border:none;border-radius:12px;font-size:15px;font-weight:bold;cursor:pointer}
        .btn-next{background:#ffd700;color:#000}
        .btn-retry{background:#ff4444;color:#fff}
        .countdown{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:80px;color:#ffd700;font-weight:bold;z-index:200;text-shadow:0 0 30px rgba(255,215,0,.6);pointer-events:none}
        @keyframes cdPop{0%{transform:translate(-50%,-50%) scale(0.5);opacity:0}50%{transform:translate(-50%,-50%) scale(1.2);opacity:.8}100%{transform:translate(-50%,-50%) scale(1);opacity:1}}
    </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ---- Constants ----
const PIECE_DEFS = {
    I: { cells:[[0,-1],[0,0],[0,1],[0,2]], color:'#4fc3f7' },
    L: { cells:[[0,-1],[0,0],[0,1],[1,1]], color:'#81c784' },
    J: { cells:[[0,-1],[0,0],[0,1],[-1,1]], color:'#ffb74d' },
    T: { cells:[[0,-1],[0,0],[0,1],[1,0]], color:'#e040fb' },
    S: { cells:[[0,0],[1,0],[0,1],[-1,1]], color:'#ff6b6b' },
    Z: { cells:[[0,0],[-1,0],[0,1],[1,1]], color:'#ffd700' },
    O: { cells:[[0,0],[1,0],[0,1],[1,1]], color:'#ff8c00' },
    I3:{ cells:[[0,-1],[0,0],[0,1]], color:'#64b5f6' },
    L3:{ cells:[[0,0],[0,1],[1,1]], color:'#a5d6a7' },
    DOT:{cells:[[0,0]], color:'#90a4ae' },
    I2:{ cells:[[0,0],[0,1]], color:'#80cbc4' },
};
const LEVELS = [
    { grid:5, start:[2,0], end:[2,4], pieces:['I','I','I3','L3','DOT'], obstacles:[] },
    { grid:5, start:[0,0], end:[4,4], pieces:['I','L','I3','L3','DOT','DOT'], obstacles:[] },
    { grid:6, start:[0,0], end:[5,5], pieces:['I','I','L','T','I3','L3','DOT'], obstacles:[[2,2],[3,3]] },
    { grid:6, start:[1,0], end:[4,5], pieces:['I','I','L','J','T','I3','I3','L3','DOT'], obstacles:[[2,2],[3,3],[0,3]] },
    { grid:7, start:[0,0], end:[6,6], pieces:['I','I','L','J','T','S','Z','I3','DOT','DOT'], obstacles:[[2,2],[3,3],[4,4],[1,4]] },
    { grid:7, start:[3,0], end:[3,6], pieces:['I','I','I','L','J','I3','I3','L3','DOT'], obstacles:[[1,2],[5,2],[1,4],[5,4],[3,3]] },
    { grid:8, start:[0,0], end:[7,7], pieces:['I','I','I','L','J','T','S','Z','O','I3','I3','L3','DOT'], obstacles:[[2,2],[2,5],[5,2],[5,5],[3,4],[4,3]] },
    { grid:8, start:[0,7], end:[7,0], pieces:['I','I','L','L','J','T','T','S','Z','I3','L3','L3','DOT','DOT'], obstacles:[[3,3],[4,4],[2,5],[5,2],[1,3],[6,4]] },
    { grid:9, start:[0,0], end:[8,8], pieces:['I','I','I','I','L','J','T','S','Z','O','I3','I3','L3','DOT','DOT'], obstacles:[[3,3],[4,4],[5,5],[2,6],[6,2],[1,4],[7,4]] },
    { grid:10, start:[0,0], end:[9,9], pieces:['I','I','I','I','L','L','J','J','T','T','S','Z','O','I3','I3','L3','L3','DOT'], obstacles:[[3,3],[4,4],[5,5],[6,6],[2,7],[7,2],[1,5],[8,4]] },
];
const LEVEL_NAMES = ['废墟起步','对角求生','暗坑初现','迂回前进','绝地逢生','中路突围','四方围困','逆流而上','深渊通道','终极筑路'];
const TIMER_SECONDS = 20;

// ---- State ----
let W, H, dpr;
let gridSize, cellSize, gridOffsetX, gridOffsetY;
let gridData, startPos, endPos, candidates, placedHistory;
let currentLevel = 0;
let won = false, failed = false;
let timeLeft = TIMER_SECONDS, timerInterval = null;
let hint = '';

// Drag
let dragging = false, dragIdx = -1, dragOffX = 0, dragOffY = 0;
let previewAnchor = null, previewValid = false;
let lastPointerX = 0, lastPointerY = 0;

// Particles
let particles = [];

// Countdown
let countdownActive = false;
let countdownValue = 0;
let cdAnimFrame = 0;

// Flash effects
let flashCells = [];

// Layout zones (computed by calcLayout)
let zone = {}; // {topBar, gridTop, gridBottom, cardTop, cardBottom, btnTop, btnBottom, hintY}

// ---- Resize ----
function resize() {
    dpr = window.devicePixelRatio || 1;
    // Safe area: handle notches / dynamic island
    const safeTop = (window.safeAreaInsets ? window.safeAreaInsets.top : 0);
    const safeBot = (window.safeAreaInsets ? window.safeAreaInsets.bottom : 0);

    W = window.innerWidth;
    H = window.innerHeight;

    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    // Recompute layout if level loaded
    if (gridSize) {
        calcLayout();
        draw();
    }
}
window.addEventListener('resize', resize);

function calcLayout() {
    if (!gridSize || !W || !H) return;

    const safeTop = (window.safeAreaInsets ? window.safeAreaInsets.top : 0);
    const safeBot = (window.safeAreaInsets ? window.safeAreaInsets.bottom : 0);

    const MARGIN_X = 12;
    const TOP_BAR_H = 56;
    const TOP_BAR_Y = safeTop + 6;
    const GRID_AREA_MIN = 80; // minimum pixels for grid area top to card area
    const CARD_AREA_H = 88;   // fixed height for card row
    const BTN_AREA_H = 52;
    const BTN_GAP = 10;
    const BTN_H = 42;
    const HINT_H = 20;
    const PADDING_BOTTOM = safeBot + 8;

    const availableH = H - safeTop - safeBot;
    const gridAreaH = availableH - TOP_BAR_H - 6 - CARD_AREA_H - BTN_AREA_H - HINT_H - PADDING_BOTTOM - 12;

    // Compute cellSize to fit grid in available width and height
    const maxW = W - MARGIN_X * 2;
    const maxH = Math.max(gridAreaH, 80); // at least 80px for grid
    cellSize = Math.floor(Math.min(maxW / gridSize, maxH / gridSize));
    cellSize = Math.max(cellSize, 12); // minimum 12px per cell

    const gridPx = cellSize * gridSize;
    gridOffsetX = Math.floor((W - gridPx) / 2);
    gridOffsetY = TOP_BAR_Y + TOP_BAR_H;

    // Define layout zones
    const gridBottom = gridOffsetY + gridPx;
    const cardTop = gridBottom + 12;
    const btnTop = cardTop + CARD_AREA_H + 6;
    const btnBottom = btnTop + BTN_AREA_H;
    const hintY = btnBottom + HINT_H + 4;

    zone = { safeTop, safeBot, TOP_BAR_Y, TOP_BAR_H, gridPx, gridBottom, cardTop, CARD_AREA_H, btnTop, BTN_H, BTN_GAP, btnBottom, hintY };
}

// ---- Particles ----
function initParticles() {
    particles = [];
    for (let i = 0; i < 30; i++) {
        particles.push({
            x: Math.random() * (W || 375),
            y: Math.random() * (H || 667),
            vx: (Math.random() - 0.5) * 0.3,
            vy: (Math.random() - 0.5) * 0.3,
            r: Math.random() * 2 + 0.5,
            a: Math.random() * 0.2 + 0.03,
        });
    }
}
function updateParticles() {
    for (const p of particles) {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
    }
}
function drawParticles() {
    for (const p of particles) {
        ctx.globalAlpha = p.a;
        ctx.fillStyle = '#ffd700';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
}

// ---- Draw ----
function draw() {
    ctx.clearRect(0, 0, W, H);
    drawParticles();
    drawTopBar();
    drawGrid();
    drawCandidates();
    drawButtons();
    drawHint();
    drawFlash();
    if (dragging) drawDragPiece();
    drawPreview();
    if (countdownActive) drawCountdownOverlay();
}

function drawTopBar() {
    const z = zone;
    ctx.fillStyle = 'rgba(255,255,255,0.03)';
    roundRect(ctx, 10, z.TOP_BAR_Y, W - 20, z.TOP_BAR_H, 14);
    ctx.fill();

    ctx.font = 'bold 15px sans-serif';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'left';
    ctx.fillText('🛤️  第 ' + (currentLevel + 1) + ' 关', 36, z.TOP_BAR_Y + 28);

    ctx.font = '11px sans-serif';
    ctx.fillStyle = '#8a8a9a';
    ctx.fillText(LEVEL_NAMES[currentLevel] || '末日筑路', 36, z.TOP_BAR_Y + 46);

    // Timer
    const tc = timeLeft <= 5 ? '#ff4444' : '#ffd700';
    ctx.font = 'bold 15px sans-serif';
    ctx.fillStyle = tc;
    ctx.textAlign = 'right';
    ctx.fillText('⏱ ' + timeLeft + 's', W - 20, z.TOP_BAR_Y + 32);
    ctx.textAlign = 'left';
}

function drawGrid() {
    if (!cellSize) return;
    const cs = cellSize, ox = gridOffsetX, oy = gridOffsetY, gs = gridSize;

    // Background
    ctx.fillStyle = '#0d0d1a';
    roundRect(ctx, ox - 4, oy - 4, cs * gs + 8, cs * gs + 8, 12);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,215,0,0.12)';
    ctx.lineWidth = 1;
    roundRect(ctx, ox - 4, oy - 4, cs * gs + 8, cs * gs + 8, 12);
    ctx.stroke();

    for (let r = 0; r < gs; r++) {
        for (let c = 0; c < gs; c++) {
            const x = ox + c * cs, y = oy + r * cs;
            ctx.strokeStyle = 'rgba(26,26,46,0.5)';
            ctx.lineWidth = 0.5;
            ctx.strokeRect(x, y, cs, cs);

            if (gridData[r][c] === 2) {
                ctx.fillStyle = 'rgba(42,21,32,0.7)';
                ctx.fillRect(x + 1, y + 1, cs - 2, cs - 2);
                ctx.strokeStyle = 'rgba(102,51,51,0.5)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(x + cs * 0.25, y + cs * 0.25);
                ctx.lineTo(x + cs * 0.75, y + cs * 0.75);
                ctx.moveTo(x + cs * 0.75, y + cs * 0.25);
                ctx.lineTo(x + cs * 0.25, y + cs * 0.75);
                ctx.stroke();
            } else if (gridData[r][c] === 1) {
                ctx.fillStyle = 'rgba(129,199,132,0.35)';
                ctx.fillRect(x + 1, y + 1, cs - 2, cs - 2);
            }
        }
    }

    drawMarker(startPos, '#4fc3f7', 'S');
    drawMarker(endPos, '#ff6b6b', 'E');
}

function drawMarker(pos, color, label) {
    if (!cellSize) return;
    const cs = cellSize;
    const x = gridOffsetX + pos[1] * cs, y = gridOffsetY + pos[0] * cs;
    const labelSize = Math.max(10, Math.min(cs * 0.42, 14));

    ctx.fillStyle = color + '26';
    ctx.fillRect(x + 1, y + 1, cs - 2, cs - 2);
    ctx.strokeStyle = color + '66';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(x + 1, y + 1, cs - 2, cs - 2);
    ctx.font = 'bold ' + labelSize + 'px sans-serif';
    ctx.fillStyle = color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, x + cs / 2, y + cs / 2);
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
}

function drawCandidates() {
    const z = zone;
    const pcs = Math.max(14, Math.min(cellSize, 28)); // preview cell size, adaptive
    const totalCards = candidates.length;
    const GAP = 5;
    const CARD_PAD = 6;

    const cardSizes = candidates.map(cand => {
        let minR = Infinity, maxR = -Infinity, minC = Infinity, maxC = -Infinity;
        for (const [r, c] of cand.cells) {
            minR = Math.min(minR, r); maxR = Math.max(maxR, r);
            minC = Math.min(minC, c); maxC = Math.max(maxC, c);
        }
        return {
            w: (maxC - minC + 1) * pcs + CARD_PAD * 2,
            h: (maxR - minR + 1) * pcs + CARD_PAD * 2,
            minR, maxR, minC, maxC
        };
    });

    // Wrap cards if needed — calculate rows
    const CARD_ROW_H = 70;
    const rows = [];
    let curRow = [], curRowW = 0;
    const maxRowW = W - 16;

    for (let i = 0; i < totalCards; i++) {
        if (curRowW + cardSizes[i].w + (curRow.length ? GAP : 0) > maxRowW && curRow.length > 0) {
            rows.push([...curRow]);
            curRow = [i];
            curRowW = cardSizes[i].w;
        } else {
            curRow.push(i);
            curRowW += cardSizes[i].w + (curRow.length > 1 ? GAP : 0);
        }
    }
    if (curRow.length > 0) rows.push(curRow);

    const totalRowH = rows.length * CARD_ROW_H;
    const cardAreaTop = z.cardTop;
    const cardAreaAvailable = H - cardAreaTop - z.safeBot - 140; // reserve space for btns+hint
    const cardAreaH = Math.min(totalRowH + 8, cardAreaAvailable);
    const startY = cardAreaTop + Math.max(0, (cardAreaH - totalRowH) / 2);

    // Label
    ctx.font = '11px sans-serif';
    ctx.fillStyle = '#8a8a9a';
    ctx.textAlign = 'center';
    ctx.fillText('拖动方块到棋盘上', W / 2, startY - 2);
    ctx.textAlign = 'left';

    window._cardRects = [];
    let cardY = startY + 4;
    let rowIdx = 0;

    for (const row of rows) {
        const rowCardSizes = row.map(i => cardSizes[i]);
        const rowTotalW = rowCardSizes.reduce((s, c, j) => s + c.w + (j > 0 ? GAP : 0), 0);
        let cardX = Math.floor((W - rowTotalW) / 2);

        for (const cardIdx of row) {
            const cand = candidates[cardIdx];
            const sz = cardSizes[cardIdx];
            const cw = sz.w, ch = sz.h;
            const cx = cardX, cy = cardY;

            ctx.fillStyle = cand.used ? 'rgba(255,255,255,0.02)' : 'rgba(255,255,255,0.05)';
            roundRect(ctx, cx, cy, cw, ch, 6);
            ctx.fill();
            ctx.strokeStyle = cand.used ? 'rgba(51,51,51,0.1)' : 'rgba(255,215,0,0.22)';
            ctx.lineWidth = 1.5;
            roundRect(ctx, cx, cy, cw, ch, 6);
            ctx.stroke();

            if (cand.used) ctx.globalAlpha = 0.2;

            for (const [r, c] of cand.cells) {
                const px = cx + CARD_PAD + (c - sz.minC) * pcs;
                const py = cy + CARD_PAD + (r - sz.minR) * pcs;
                ctx.fillStyle = cand.def.color;
                ctx.fillRect(px + 1, py + 1, pcs - 2, pcs - 2);
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 0.5;
                ctx.strokeRect(px + 1, py + 1, pcs - 2, pcs - 2);
            }

            ctx.globalAlpha = 1;

            if (!cand.used) {
                window._cardRects.push({
                    x: cx - 4, y: cy - 4,
                    w: cw + 8, h: ch + 8,
                    idx: cardIdx
                });
            }

            cardX += cw + GAP;
        }

        cardY += CARD_ROW_H;
        rowIdx++;
    }
}

function drawButtons() {
    const z = zone;
    const btnY = z.btnTop;
    const btnW = Math.floor((W - 32 - z.BTN_GAP) / 2);
    const btnH = z.BTN_H;

    window._btnRects = [];

    // Undo
    const ux = 16;
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    roundRect(ctx, ux, btnY, btnW, btnH, 10);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,215,0,0.2)';
    ctx.lineWidth = 1;
    roundRect(ctx, ux, btnY, btnW, btnH, 10);
    ctx.stroke();
    ctx.font = 'bold 13px sans-serif';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('↩️ 撤销', ux + btnW / 2, btnY + btnH / 2);
    window._btnRects.push({ x: ux, y: btnY, w: btnW, h: btnH, action: 'undo' });

    // Reset
    const rx = ux + btnW + z.BTN_GAP;
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    roundRect(ctx, rx, btnY, btnW, btnH, 10);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,215,0,0.2)';
    ctx.lineWidth = 1;
    roundRect(ctx, rx, btnY, btnW, btnH, 10);
    ctx.stroke();
    ctx.fillText('🔃 重置', rx + btnW / 2, btnY + btnH / 2);
    window._btnRects.push({ x: rx, y: btnY, w: btnW, h: btnH, action: 'reset' });

    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
}

function drawHint() {
    const z = zone;
    ctx.font = '11px sans-serif';
    ctx.fillStyle = hint.includes('✅') ? '#81c784' : hint.includes('❌') ? '#ff6b6b' : '#8a8a9a';
    ctx.textAlign = 'center';
    ctx.fillText(hint || '拖动方块到棋盘上', W / 2, z.hintY);
    ctx.textAlign = 'left';
}

function drawDragPiece() {
    if (dragIdx < 0 || !cellSize) return;
    const cand = candidates[dragIdx];
    const cs = cellSize;
    let minR = Infinity, maxR = -Infinity, minC = Infinity, maxC = -Infinity;
    for (const [r, c] of cand.cells) {
        minR = Math.min(minR, r); maxR = Math.max(maxR, r);
        minC = Math.min(minC, c); maxC = Math.max(maxC, c);
    }
    const offX = (maxC - minC + 1) * cs / 2;
    const offY = (maxR - minR + 1) * cs / 2;

    ctx.globalAlpha = 0.7;
    for (const [r, c] of cand.cells) {
        const x = lastPointerX + (c - minC) * cs - offX;
        const y = lastPointerY + (r - minR) * cs - offY;
        ctx.fillStyle = cand.def.color;
        ctx.fillRect(x + 1, y + 1, cs - 2, cs - 2);
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth = 2;
        ctx.strokeRect(x + 1, y + 1, cs - 2, cs - 2);
    }
    ctx.globalAlpha = 1;
}

function drawPreview() {
    if (!dragging || !previewAnchor || !cellSize) return;
    const cs = cellSize, ox = gridOffsetX, oy = gridOffsetY;
    const [ar, ac] = previewAnchor;
    const cand = candidates[dragIdx];

    for (const [r, c] of cand.cells) {
        const gr = ar + r, gc = ac + c;
        if (gr < 0 || gr >= gridSize || gc < 0 || gc >= gridSize) continue;
        ctx.fillStyle = previewValid ? 'rgba(255,215,0,0.38)' : 'rgba(255,51,51,0.38)';
        ctx.fillRect(ox + gc * cs + 2, oy + gr * cs + 2, cs - 4, cs - 4);
    }
}

function drawFlash() {
    if (!cellSize) return;
    const now = Date.now();
    flashCells = flashCells.filter(f => now - f.t < 300);
    for (const f of flashCells) {
        const elapsed = now - f.t;
        const a = 0.5 * (1 - elapsed / 300);
        ctx.fillStyle = `rgba(255,255,255,${a})`;
        ctx.fillRect(gridOffsetX + f.c * cellSize + 1, gridOffsetY + f.r * cellSize + 1, cellSize - 2, cellSize - 2);
    }
}

function drawCountdownOverlay() {
    if (!countdownActive) return;
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W, H);
    ctx.font = 'bold ' + Math.min(80, W * 0.22) + 'px sans-serif';
    ctx.fillStyle = '#ffd700';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(countdownValue > 0 ? String(countdownValue) : 'GO!', W / 2, H / 2);
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
}

// ---- Game Logic ----
function loadLevel(idx) {
    currentLevel = idx;
    const lv = LEVELS[idx] || LEVELS[LEVELS.length - 1];
    gridSize = lv.grid;
    startPos = [...lv.start];
    endPos = [...lv.end];
    won = false;
    failed = false;
    placedHistory = [];
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }

    gridData = [];
    for (let r = 0; r < gridSize; r++) {
        gridData[r] = [];
        for (let c = 0; c < gridSize; c++) gridData[r][c] = 0;
    }
    for (const [r, c] of lv.obstacles) {
        if (r >= 0 && r < gridSize && c >= 0 && c < gridSize) gridData[r][c] = 2;
    }

    candidates = lv.pieces.map(name => {
        const def = PIECE_DEFS[name];
        if (!def) return { name, def: PIECE_DEFS.DOT, cells: [[0,0]], used: false };
        return { name, def, cells: def.cells.map(c => [...c]), used: false };
    });

    hint = '';
    timeLeft = TIMER_SECONDS;
    flashCells = [];
    dragging = false;
    dragIdx = -1;
    previewAnchor = null;
    previewValid = false;
    countdownActive = false;
    countdownValue = 0;

    calcLayout();
    draw();
    startCountdown();
}

function startCountdown() {
    countdownActive = true;
    countdownValue = 3;
    let count = 3;
    function tick() {
        countdownValue = count;
        draw();
        if (count > 0) {
            setTimeout(tick, 700);
            count--;
        } else {
            countdownValue = 0; // GO!
            draw();
            setTimeout(() => {
                countdownActive = false;
                startTimer();
                draw();
            }, 500);
        }
    }
    tick();
}

function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timeLeft = TIMER_SECONDS;
    timerInterval = setInterval(() => {
        if (won || failed || countdownActive) return;
        timeLeft--;
        draw();
        if (timeLeft <= 0) {
            failed = true;
            clearInterval(timerInterval);
            timerInterval = null;
            setTimeout(showFail, 300);
        }
    }, 1000);
}

function placePiece(idx, anchorR, anchorC) {
    const cand = candidates[idx];
    const absCells = cand.cells.map(([r, c]) => [anchorR + r, anchorC + c]);
    for (const [r, c] of absCells) {
        if (r < 0 || r >= gridSize || c < 0 || c >= gridSize) return false;
        if (gridData[r][c] === 2 || gridData[r][c] === 1) return false;
    }
    for (const [r, c] of absCells) gridData[r][c] = 1;
    placedHistory.push({ idx, anchorR, anchorC, cells: absCells });
    cand.used = true;

    const now = Date.now();
    for (const [r, c] of absCells) flashCells.push({ r, c, t: now });

    hint = '✅ 方块已放置';
    draw();

    if (checkWin()) {
        won = true;
        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        setTimeout(showWin, 500);
    } else {
        // Check if remaining pieces can possibly connect
        if (!canPossiblyWin()) {
            hint = '⚠️ 路可能断了';
        }
    }
    return true;
}

function undo() {
    if (placedHistory.length === 0 || won || failed) return;
    const last = placedHistory.pop();
    for (const [r, c] of last.cells) gridData[r][c] = 0;
    candidates[last.idx].used = false;
    hint = '';
    draw();
}

function checkWin() {
    if (!gridData || !startPos || !endPos) return false;
    const gs = gridSize;
    const visited = Array.from({ length: gs }, () => Array(gs).fill(false));
    const queue = [startPos];
    visited[startPos[0]][startPos[1]] = true;
    const dirs = [[0, 1], [0, -1], [1, 0], [-1, 0]];
    while (queue.length) {
        const [r, c] = queue.shift();
        if (r === endPos[0] && c === endPos[1]) return true;
        for (const [dr, dc] of dirs) {
            const nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < gs && nc >= 0 && nc < gs && !visited[nr][nc] && gridData[nr][nc] === 1) {
                visited[nr][nc] = true;
                queue.push([nr, nc]);
            }
        }
    }
    return false;
}

// Strict fail condition: path is impossible with remaining pieces
function canPossiblyWin() {
    // Simple heuristic: find all reachable cells from start using only placed pieces
    if (!gridData || !startPos) return true;
    const gs = gridSize;
    const reachable = Array.from({ length: gs }, () => Array(gs).fill(false));
    const queue = [startPos];
    reachable[startPos[0]][startPos[1]] = true;
    const dirs = [[0, 1], [0, -1], [1, 0], [-1, 0]];
    while (queue.length) {
        const [r, c] = queue.shift();
        for (const [dr, dc] of dirs) {
            const nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < gs && nc >= 0 && nc < gs && !reachable[nr][nc] && gridData[nr][nc] !== 2) {
                reachable[nr][nc] = true;
                queue.push([nr, nc]);
            }
        }
    }
    // endPos must be reachable without placing more pieces
    if (!reachable[endPos[0]][endPos[1]]) return false;

    // Check if any remaining piece can add new reachable cells
    // (very simple check: if no unplaced pieces, and not won, then false)
    const hasUnused = candidates.some(c => !c.used);
    return hasUnused; // if all used and not won, this shouldn't happen with proper win check
}

function findPath() {
    if (!gridData || !startPos || !endPos) return new Set();
    const gs = gridSize;
    const visited = Array.from({ length: gs }, () => Array(gs).fill(false));
    const parent = Array.from({ length: gs }, () => Array(gs).fill(null));
    const queue = [startPos];
    visited[startPos[0]][startPos[1]] = true;
    const dirs = [[0, 1], [0, -1], [1, 0], [-1, 0]];
    while (queue.length) {
        const [r, c] = queue.shift();
        if (r === endPos[0] && c === endPos[1]) {
            const path = new Set();
            let cur = [r, c];
            while (cur) { path.add(cur[0] * gs + cur[1]); cur = parent[cur[0]][cur[1]]; }
            return path;
        }
        for (const [dr, dc] of dirs) {
            const nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < gs && nc >= 0 && nc < gs && !visited[nr][nc] && gridData[nr][nc] === 1) {
                visited[nr][nc] = true;
                parent[nr][nc] = [r, c];
                queue.push([nr, nc]);
            }
        }
    }
    return new Set();
}

// ---- Modals ----
function showModal(content, className) {
    document.querySelectorAll('.modal-overlay').forEach(e => e.remove());
    const div = document.createElement('div');
    div.className = 'modal-overlay';
    div.innerHTML = `<div class="modal-box ${className || ''}">${content}</div>`;
    document.body.appendChild(div);
    return div;
}

function showWin() {
    draw();
    if (!cellSize) return;
    const pathSet = findPath();
    const cs = cellSize, ox = gridOffsetX, oy = gridOffsetY;
    for (const key of pathSet) {
        const r = Math.floor(key / gridSize), c = key % gridSize;
        ctx.fillStyle = 'rgba(129,199,132,0.5)';
        ctx.fillRect(ox + c * cs + 2, oy + r * cs + 2, cs - 4, cs - 4);
    }
    draw();

    const used = placedHistory.length;
    const allUsed = candidates.every(c => c.used);
    const div = showModal(`
        <h2>🎉 通路达成!</h2>
        <p>用了 ${used} 块${allUsed ? '' : '（还有剩余方块）'}完成筑路</p>
        <button id="btnNext">下一关 →</button>
    `);
    const btnNext = document.getElementById('btnNext');
    if (btnNext) btnNext.onclick = () => {
        div.remove();
        loadLevel(Math.min(currentLevel + 1, LEVELS.length - 1));
    };
}

function showFail() {
    hint = '⏰ 时间到!';
    draw();
    const div = showModal(`
        <h2>⏰ 时间到!</h2>
        <p>第 ${currentLevel + 1} 关失败，再试试吧</p>
        <button id="btnRetry">🔄 再试一次</button>
    `, 'fail');
    const btnRetry = document.getElementById('btnRetry');
    if (btnRetry) btnRetry.onclick = () => {
        div.remove();
        loadLevel(currentLevel);
    };
}

// ---- Input ----
function getXY(e) {
    const rect = canvas.getBoundingClientRect();
    if (e.touches && e.touches.length > 0) {
        return [e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top];
    }
    return [e.clientX - rect.left, e.clientY - rect.top];
}

function hitTest(x, y, rects) {
    for (const r of rects) {
        if (x >= r.x && x < r.x + r.w && y >= r.y && y < r.y + r.h) return r;
    }
    return null;
}

function onPointerDown(e) {
    if (won || failed || countdownActive) return;
    e.preventDefault();
    const [x, y] = getXY(e);
    lastPointerX = x;
    lastPointerY = y;

    const btn = hitTest(x, y, window._btnRects || []);
    if (btn) {
        if (btn.action === 'undo') undo();
        else if (btn.action === 'reset') loadLevel(currentLevel);
        return;
    }

    const card = hitTest(x, y, window._cardRects || []);
    if (card) {
        dragging = true;
        dragIdx = card.idx;
        previewAnchor = null;
        previewValid = false;
        draw();
    }
}

function onPointerMove(e) {
    if (!dragging) return;
    e.preventDefault();
    const [x, y] = getXY(e);
    lastPointerX = x;
    lastPointerY = y;

    if (!cellSize || !gridSize) { draw(); return; }
    const cs = cellSize, ox = gridOffsetX, oy = gridOffsetY;
    const cand = candidates[dragIdx];
    let minR = Infinity, maxR = -Infinity, minC = Infinity, maxC = -Infinity;
    for (const [r, c] of cand.cells) {
        minR = Math.min(minR, r); maxR = Math.max(maxR, r);
        minC = Math.min(minC, c); maxC = Math.max(maxC, c);
    }
    const gc = Math.floor((x - ox) / cs);
    const gr = Math.floor((y - oy) / cs);
    const anchorR = Math.round(gr - (minR + maxR) / 2);
    const anchorC = Math.round(gc - (minC + maxC) / 2);

    let valid = true;
    for (const [r, c] of cand.cells) {
        const ar = anchorR + r, ac = anchorC + c;
        if (ar < 0 || ar >= gridSize || ac < 0 || ac >= gridSize) valid = false;
        else if (gridData[ar][ac] === 2 || gridData[ar][ac] === 1) valid = false;
    }
    previewAnchor = [anchorR, anchorC];
    previewValid = valid;
    draw();
}

function onPointerUp(e) {
    if (!dragging) return;
    e.preventDefault();
    const [x, y] = lastPointerX !== undefined ? [lastPointerX, lastPointerY] : getXY(e);
    dragging = false;

    if (cellSize && gridSize) {
        const cs = cellSize, ox = gridOffsetX, oy = gridOffsetY;
        const gs = gridSize;
        if (x >= ox && x < ox + cs * gs && y >= oy && y < oy + cs * gs && previewValid) {
            placePiece(dragIdx, previewAnchor[0], previewAnchor[1]);
        } else if (x < ox || x >= ox + cs * gs || y < oy || y >= oy + cs * gs) {
            hint = '放到了棋盘外面哦';
            draw();
        } else if (!previewValid) {
            hint = '❌ 无法放在这里';
            draw();
        }
    }

    dragIdx = -1;
    previewAnchor = null;
    previewValid = false;
    if (hint) {
        setTimeout(() => { hint = ''; draw(); }, 2000);
    }
}

canvas.addEventListener('pointerdown', onPointerDown, { passive: false });
canvas.addEventListener('pointermove', onPointerMove, { passive: false });
canvas.addEventListener('pointerup', onPointerUp, { passive: false });
canvas.addEventListener('pointercancel', onPointerUp, { passive: false });

// ---- Helpers ----
function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

// ---- Game loop ----
function loop() {
    updateParticles();
    draw();
    requestAnimationFrame(loop);
}

// ---- Init ----
window._cardRects = [];
window._btnRects = [];
resize();
initParticles();
loadLevel(0);
loop();
</script>
</body>
