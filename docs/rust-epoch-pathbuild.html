<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>末日锈纪:筑路求生 V2.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: #0a0a12;
            overflow: hidden;
            user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
        }
        #gameContainer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
</head>
<body>
<div id="gameContainer"></div>
<script>
// ============================================
// 末日锈纪:筑路求生 V2.0 — Phaser 3
// ============================================

// ---- 方块定义（相对坐标，0,0为中心） ----
const PIECE_DEFS = {
    I: { cells: [[0,-1],[0,0],[0,1],[0,2]], color: 0x4fc3f7 },
    L: { cells: [[0,-1],[0,0],[0,1],[1,1]], color: 0x81c784 },
    J: { cells: [[0,-1],[0,0],[0,1],[-1,1]], color: 0xffb74d },
    T: { cells: [[0,-1],[0,0],[0,1],[1,0]], color: 0xe040fb },
    S: { cells: [[0,0],[1,0],[0,1],[-1,1]], color: 0xff6b6b },
    Z: { cells: [[0,0],[-1,0],[0,1],[1,1]], color: 0xffd700 },
    O: { cells: [[0,0],[1,0],[0,1],[1,1]], color: 0xff8c00 },
    I3: { cells: [[0,-1],[0,0],[0,1]], color: 0x64b5f6 },
    L3: { cells: [[0,0],[0,1],[1,1]], color: 0xa5d6a7 },
    DOT: { cells: [[0,0]], color: 0x90a4ae },
    I2: { cells: [[0,0],[0,1]], color: 0x80cbc4 },
};

function rotateCells(cells) {
    return cells.map(([r,c]) => [c, -r]);
}

// ---- 关卡 ----
const LEVELS = [
    { grid: 5, start: [2,0], end: [2,4], pieces: ['I','I','I3','L3','DOT'], obstacles: [] },
    { grid: 5, start: [0,0], end: [4,4], pieces: ['I','L','I3','L3','DOT','DOT'], obstacles: [] },
    { grid: 6, start: [0,0], end: [5,5], pieces: ['I','I','L','T','I3','L3','DOT'], obstacles: [[2,2],[3,3]] },
    { grid: 6, start: [1,0], end: [4,5], pieces: ['I','I','L','J','T','I3','L3','DOT'], obstacles: [[2,2],[3,3],[0,3]] },
    { grid: 7, start: [0,0], end: [6,6], pieces: ['I','I','L','J','T','S','Z','I3','DOT','DOT'], obstacles: [[2,2],[3,3],[4,4],[1,4]] },
    { grid: 7, start: [3,0], end: [3,6], pieces: ['I','I','I','L','J','I3','I3','L3','DOT'], obstacles: [[1,2],[5,2],[1,4],[5,4],[3,3]] },
    { grid: 8, start: [0,0], end: [7,7], pieces: ['I','I','I','L','J','T','S','Z','O','I3','I3','L3','DOT'], obstacles: [[2,2],[2,5],[5,2],[5,5],[3,4],[4,3]] },
    { grid: 8, start: [0,7], end: [7,0], pieces: ['I','I','L','L','J','T','T','S','Z','I3','L3','L3','DOT','DOT'], obstacles: [[3,3],[4,4],[2,5],[5,2],[1,3],[6,4]] },
    { grid: 9, start: [0,0], end: [8,8], pieces: ['I','I','I','I','L','J','T','S','Z','O','I3','I3','L3','DOT','DOT'], obstacles: [[3,3],[4,4],[5,5],[2,6],[6,2],[1,4],[7,4]] },
    { grid: 10, start: [0,0], end: [9,9], pieces: ['I','I','I','I','L','L','J','J','T','T','S','Z','O','I3','I3','L3','L3','DOT'], obstacles: [[3,3],[4,4],[5,5],[6,6],[2,7],[7,2],[1,5],[8,4]] },
];

const LEVEL_NAMES = ['废墟起步','对角求生','暗坑初现','迂回前进','绝地逢生','中路突围','四方围困','逆流而上','深渊通道','终极筑路'];

const COLORS = {
    bg: 0x0a0a12,
    gridBg: 0x0d0d1a,
    gridLine: 0x1a1a2e,
    obstacle: 0x2a1520,
    obstacleX: 0x663333,
    placed: 0x81c784,
    start: 0x4fc3f7,
    end: 0xff6b6b,
    preview: 0xffd700,
    previewBad: 0xff3333,
    pathGlow: 0x81c784,
    text: 0xffffff,
    textDim: 0x8a8a9a,
    gold: 0xffd700,
    timerNormal: 0xffd700,
    timerUrgent: 0xff4444,
};

const TIMER_SECONDS = 20;

// ===================== Phaser Scene =====================
class GameScene extends Phaser.Scene {
    constructor() { super('GameScene'); }

    create() {
        this.w = this.cameras.main.width;
        this.h = this.cameras.main.height;
        this.currentLevel = 0;
        this.cellSize = 0;
        this.gridOffsetX = 0;
        this.gridOffsetY = 0;
        this.gridGraphics = null;
        this.overlayGraphics = null;
        this.timerText = null;
        this.levelText = null;
        this.hintText = null;
        this.candidatesContainer = null;
        this.piecesGroup = null;
        this.dragPiece = null;
        this.dragData = null;
        this.gridData = [];
        this.gridSize = 5;
        this.startPos = [0,0];
        this.endPos = [0,0];
        this.candidates = [];
        this.placedHistory = [];
        this.won = false;
        this.failed = false;
        this.timeLeft = TIMER_SECONDS;
        this.timerEvent = null;
        this.pathGlowTimer = 0;

        // Static groups
        this.piecesGroup = this.add.group();
        this.overlayGraphics = this.add.graphics().setDepth(50);

        this.loadLevel(0);
    }

    loadLevel(idx) {
        this.currentLevel = idx;
        const lv = LEVELS[idx] || LEVELS[LEVELS.length - 1];
        this.gridSize = lv.grid;
        this.startPos = [...lv.start];
        this.endPos = [...lv.end];

        // Reset state
        this.won = false;
        this.failed = false;
        this.timeLeft = TIMER_SECONDS;
        this.placedHistory = [];
        if (this.timerEvent) { this.timerEvent.remove(); this.timerEvent = null; }

        // Init grid: 0=empty, 1=placed, 2=obstacle
        this.gridData = [];
        for (let r = 0; r < this.gridSize; r++) {
            this.gridData[r] = [];
            for (let c = 0; c < this.gridSize; c++) this.gridData[r][c] = 0;
        }
        for (const [r,c] of lv.obstacles) this.gridData[r][c] = 2;

        // Candidates
        this.candidates = lv.pieces.map((name, i) => ({
            name, def: PIECE_DEFS[name], cells: PIECE_DEFS[name].cells.map(c=>[...c]), used: false
        }));

        // Layout
        this.calcLayout();
        this.drawGrid();
        this.drawCandidates();
        this.drawUI();
        this.startTimer();
    }

    calcLayout() {
        const maxGridW = Math.min(this.w - 20, 420);
        const maxGridH = this.h * 0.42;
        this.cellSize = Math.floor(Math.min(maxGridW / this.gridSize, maxGridH / this.gridSize));
        const gridPx = this.cellSize * this.gridSize;
        this.gridOffsetX = Math.floor((this.w - gridPx) / 2);
        this.gridOffsetY = 70; // top bar space
    }

    // ---- Draw grid ----
    drawGrid() {
        if (this.gridGraphics) this.gridGraphics.destroy();
        this.gridGraphics = this.add.graphics().setDepth(1);
        const g = this.gridGraphics;
        const cs = this.cellSize;
        const ox = this.gridOffsetX;
        const oy = this.gridOffsetY;
        const gs = this.gridSize;

        // Background
        g.fillStyle(COLORS.gridBg, 1);
        g.fillRoundedRect(ox - 4, oy - 4, cs * gs + 8, cs * gs + 8, 12);
        g.lineStyle(1, 0xffd700, 0.15);
        g.strokeRoundedRect(ox - 4, oy - 4, cs * gs + 8, cs * gs + 8, 12);

        // Cells
        for (let r = 0; r < gs; r++) {
            for (let c = 0; c < gs; c++) {
                const x = ox + c * cs;
                const y = oy + r * cs;
                const v = this.gridData[r][c];

                // Grid line
                g.lineStyle(0.5, COLORS.gridLine, 0.5);
                g.strokeRect(x, y, cs, cs);

                if (v === 2) {
                    g.fillStyle(COLORS.obstacle, 0.7);
                    g.fillRect(x + 1, y + 1, cs - 2, cs - 2);
                    g.lineStyle(2, COLORS.obstacleX, 0.5);
                    g.beginPath();
                    g.moveTo(x + cs * 0.25, y + cs * 0.25);
                    g.lineTo(x + cs * 0.75, y + cs * 0.75);
                    g.moveTo(x + cs * 0.75, y + cs * 0.25);
                    g.lineTo(x + cs * 0.25, y + cs * 0.75);
                    g.strokePath();
                }
            }
        }

        // Start marker
        this.drawMarker(this.startPos, COLORS.start, 'S');
        // End marker
        this.drawMarker(this.endPos, COLORS.end, 'E');
    }

    drawMarker(pos, color, label) {
        const cs = this.cellSize;
        const x = this.gridOffsetX + pos[1] * cs;
        const y = this.gridOffsetY + pos[0] * cs;
        const g = this.gridGraphics;

        g.fillStyle(color, 0.2);
        g.fillRect(x + 1, y + 1, cs - 2, cs - 2);

        this.add.text(x + cs / 2, y + cs / 2, label, {
            fontSize: Math.max(12, cs * 0.45) + 'px',
            fontFamily: 'sans-serif',
            fontStyle: 'bold',
            color: '#' + color.toString(16).padStart(6, '0'),
        }).setOrigin(0.5).setDepth(2);
    }

    // ---- Draw candidates ----
    drawCandidates() {
        if (this.candidatesContainer) this.candidatesContainer.destroy();
        this.candidatesContainer = this.add.container(0, 0).setDepth(10);

        const cs = Math.min(20, Math.floor((this.w - 40) / (this.candidates.length * 3)));
        const totalW = this.candidates.length * (cs * 3 + 8) - 8;
        const startX = Math.floor((this.w - totalW) / 2);
        const baseY = this.gridOffsetY + this.cellSize * this.gridSize + 16;

        // Label
        this.add.text(this.w / 2, baseY - 4, '拖动方块到棋盘上', {
            fontSize: '12px', color: '#8a8a9a',
        }).setOrigin(0.5, 1).setDepth(10);

        this.candidates.forEach((cand, idx) => {
            const cells = cand.cells;
            let minR = Infinity, maxR = -Infinity, minC = Infinity, maxC = -Infinity;
            for (const [r, c] of cells) { minR = Math.min(minR, r); maxR = Math.max(maxR, r); minC = Math.min(minC, c); maxC = Math.max(maxC, c); }
            const pw = (maxC - minC + 1) * cs;
            const ph = (maxR - minR + 1) * cs;
            const cardW = pw + 12;
            const cardH = ph + 12;
            const cardX = startX + idx * (cardW + 8) + cardW / 2;
            const cardY = baseY + 8 + cardH / 2;

            // Card background
            const cardBg = this.add.graphics().setDepth(10);
            cardBg.fillStyle(0xffffff, 0.05);
            cardBg.lineStyle(2, cand.used ? 0x333333 : 0xffd700, cand.used ? 0.1 : 0.25);
            cardBg.fillRoundedRect(-cardW / 2, -cardH / 2, cardW, cardH, 8);
            cardBg.strokeRoundedRect(-cardW / 2, -cardH / 2, cardW, cardH, 8);

            // Piece preview
            const pieceGfx = this.add.graphics().setDepth(11);
            for (const [r, c] of cells) {
                const px = (c - minC) * cs + 6 - cardW / 2;
                const py = (r - minR) * cs + 6 - cardH / 2;
                pieceGfx.fillStyle(cand.def.color, cand.used ? 0.15 : 0.85);
                pieceGfx.fillRect(px + 1, py + 1, cs - 2, cs - 2);
                pieceGfx.lineStyle(1, 0xffffff, 0.25);
                pieceGfx.strokeRect(px + 1, py + 1, cs - 2, cs - 2);
            }

            const card = this.add.container(cardX, cardY, [cardBg, pieceGfx]).setDepth(10);
            if (cand.used) card.setAlpha(0.2);

            // Interactive zone (invisible, larger for touch)
            const hitArea = this.add.rectangle(0, 0, cardW + 8, cardH + 8, 0x000000, 0)
                .setInteractive({ useHandCursor: true })
                .setDepth(12);

            card.add(hitArea);

            if (!cand.used) {
                hitArea.on('pointerdown', (pointer) => {
                    this.startDrag(pointer, idx, card);
                });
            }
        });
    }

    // ---- Drag ----
    startDrag(pointer, idx, sourceCard) {
        if (this.won || this.failed) return;
        const cand = this.candidates[idx];

        // Create drag sprite
        const cs = this.cellSize;
        let minR = Infinity, maxR = -Infinity, minC = Infinity, maxC = -Infinity;
        for (const [r, c] of cand.cells) { minR = Math.min(minR, r); maxR = Math.max(maxR, r); minC = Math.min(minC, c); maxC = Math.max(maxC, c); }

        const dragGfx = this.add.graphics().setDepth(100);
        const dragContainer = this.add.container(pointer.x, pointer.y, [dragGfx]).setDepth(100);
        dragContainer.setAlpha(0.7);

        this.dragData = { idx, cand, dragGfx, dragContainer, sourceCard, cells: cand.cells };
        this.sourceCardAlpha = sourceCard.alpha;
        sourceCard.setAlpha(0.3);

        this.input.setDraggable(dragContainer);
        this.input.on('drag', (pointer, gameObject, dragX, dragY) => {
            gameObject.x = dragX;
            gameObject.y = dragY;
            this.drawPreview(dragX, dragY);
        });
        this.input.on('dragend', (pointer, gameObject) => {
            this.endDrag(pointer);
        });

        this.drawDragPiece(pointer.x, pointer.y);
    }

    drawDragPiece(px, py) {
        if (!this.dragData) return;
        const { dragGfx, cells } = this.dragData;
        const cs = this.cellSize;

        dragGfx.clear();
        let minR = Infinity, maxR = -Infinity, minC = Infinity, maxC = -Infinity;
        for (const [r, c] of cells) { minR = Math.min(minR, r); maxR = Math.max(maxR, r); minC = Math.min(minC, c); maxC = Math.max(maxC, c); }
        const offX = (maxC - minC + 1) * cs / 2;
        const offY = (maxR - minR + 1) * cs / 2;

        for (const [r, c] of cells) {
            const x = (c - minC) * cs - offX;
            const y = (r - minR) * cs - offY;
            dragGfx.fillStyle(this.dragData.cand.def.color, 0.7);
            dragGfx.fillRect(x + 1, y + 1, cs - 2, cs - 2);
            dragGfx.lineStyle(2, 0xffffff, 0.5);
            dragGfx.strokeRect(x + 1, y + 1, cs - 2, cs - 2);
        }
    }

    drawPreview(px, py) {
        const ov = this.overlayGraphics;
        ov.clear();
        if (!this.dragData) return;

        const { cells, cand } = this.dragData;
        const cs = this.cellSize;
        const ox = this.gridOffsetX;
        const oy = this.gridOffsetY;
        const gs = this.gridSize;

        // Snap to grid center of pointer
        const gc = Math.floor((px - ox) / cs);
        const gr = Math.floor((py - oy) / cs);

        // Calculate anchor: pointer should be roughly center of piece
        let minR = Infinity, maxR = -Infinity, minC = Infinity, maxC = -Infinity;
        for (const [r, c] of cells) { minR = Math.min(minR, r); maxR = Math.max(maxR, r); minC = Math.min(minC, c); maxC = Math.max(maxC, c); }
        const centerR = (minR + maxR) / 2;
        const centerC = (minC + maxC) / 2;
        const anchorR = Math.round(gr - centerR);
        const anchorC = Math.round(gc - centerC);

        let valid = true;
        const absCells = [];
        for (const [r, c] of cells) {
            const ar = anchorR + r;
            const ac = anchorC + c;
            absCells.push([ar, ac]);
            if (ar < 0 || ar >= gs || ac < 0 || ac >= gs) valid = false;
            else if (this.gridData[ar][ac] === 2 || this.gridData[ar][ac] === 1) valid = false;
        }

        for (const [r, c] of absCells) {
            if (r < 0 || r >= gs || c < 0 || c >= gs) continue;
            const x = ox + c * cs;
            const y = oy + r * cs;
            ov.fillStyle(valid ? COLORS.preview : COLORS.previewBad, 0.35);
            ov.fillRect(x + 2, y + 2, cs - 4, cs - 4);
        }

        this._previewAnchor = [anchorR, anchorC];
        this._previewValid = valid;
    }

    endDrag(pointer) {
        if (!this.dragData) return;

        const { idx, cand, dragContainer, sourceCard } = this.dragData;
        sourceCard.setAlpha(this.sourceCardAlpha);

        // Clean up drag
        this.input.off('drag');
        this.input.off('dragend');
        dragContainer.destroy();
        this.overlayGraphics.clear();

        // Check if pointer is over grid
        const px = pointer.x;
        const py = pointer.y;
        const ox = this.gridOffsetX;
        const oy = this.gridOffsetY;
        const cs = this.cellSize;
        const gs = this.gridSize;

        if (px >= ox && px < ox + cs * gs && py >= oy && py < oy + cs * gs && this._previewValid) {
            this.placePiece(idx, this._previewAnchor[0], this._previewAnchor[1]);
        }

        this.dragData = null;
        this._previewAnchor = null;
        this._previewValid = false;
    }

    // ---- Place piece ----
    placePiece(idx, anchorR, anchorC) {
        const cand = this.candidates[idx];
        const cells = cand.cells;
        const absCells = cells.map(([r, c]) => [anchorR + r, anchorC + c]);

        // Double-check validity
        const gs = this.gridSize;
        for (const [r, c] of absCells) {
            if (r < 0 || r >= gs || c < 0 || c >= gs) return;
            if (this.gridData[r][c] === 2 || this.gridData[r][c] === 1) return;
        }

        // Place on grid
        for (const [r, c] of absCells) {
            this.gridData[r][c] = 1;
        }

        this.placedHistory.push({ idx, anchorR, anchorC, cells: absCells });
        cand.used = true;

        // Redraw
        this.drawGrid();
        this.drawCandidates();
        this.drawButtons();
        this.setHint('方块已放置');

        // Check win
        if (this.checkWin()) {
            this.won = true;
            if (this.timerEvent) { this.timerEvent.remove(); this.timerEvent = null; }
            this.time.addEvent({ delay: 400, callback: () => this.showWin() });
        }
    }

    undo() {
        if (this.placedHistory.length === 0 || this.won || this.failed) return;
        const last = this.placedHistory.pop();
        for (const [r, c] of last.cells) {
            this.gridData[r][c] = 0;
        }
        this.candidates[last.idx].used = false;
        this.drawGrid();
        this.drawCandidates();
        this.drawButtons();
        this.setHint('已撤销');
    }

    // ---- Win check (BFS) ----
    checkWin() {
        const gs = this.gridSize;
        const visited = Array.from({ length: gs }, () => Array(gs).fill(false));
        const queue = [this.startPos];
        visited[this.startPos[0]][this.startPos[1]] = true;
        const dirs = [[0,1],[0,-1],[1,0],[-1,0]];

        while (queue.length > 0) {
            const [r, c] = queue.shift();
            if (r === this.endPos[0] && c === this.endPos[1]) return true;
            for (const [dr, dc] of dirs) {
                const nr = r + dr, nc = c + dc;
                if (nr >= 0 && nr < gs && nc >= 0 && nc < gs && !visited[nr][nc]) {
                    const v = this.gridData[nr][nc];
                    if (v === 1) { // placed cells are walkable; start/end are also on placed or adjacent
                        visited[nr][nc] = true;
                        queue.push([nr, nc]);
                    }
                }
            }
        }
        // Also check direct adjacency from start to end
        return false;
    }

    findPath() {
        const gs = this.gridSize;
        const visited = Array.from({ length: gs }, () => Array(gs).fill(false));
        const parent = Array.from({ length: gs }, () => Array(gs).fill(null));
        const queue = [this.startPos];
        visited[this.startPos[0]][this.startPos[1]] = true;
        const dirs = [[0,1],[0,-1],[1,0],[-1,0]];

        // Start and end are walkable nodes even if gridData is 0
        while (queue.length > 0) {
            const [r, c] = queue.shift();
            if (r === this.endPos[0] && c === this.endPos[1]) {
                const path = new Set();
                let cur = [r, c];
                while (cur) { path.add(cur[0] * gs + cur[1]); cur = parent[cur[0]][cur[1]]; }
                return path;
            }
            for (const [dr, dc] of dirs) {
                const nr = r + dr, nc = c + dc;
                if (nr >= 0 && nr < gs && nc >= 0 && nc < gs && !visited[nr][nc]) {
                    const v = this.gridData[nr][nc];
                    if (v === 1) {
                        visited[nr][nc] = true;
                        parent[nr][nc] = [r, c];
                        queue.push([nr, nc]);
                    }
                }
            }
        }
        return new Set();
    }

    // ---- Timer ----
    startTimer() {
        if (this.timerEvent) this.timerEvent.remove();
        this.timeLeft = TIMER_SECONDS;
        this.updateTimerUI();

        this.timerEvent = this.time.addEvent({
            delay: 1000,
            repeat: TIMER_SECONDS,
            callback: () => {
                if (this.won || this.failed) { this.timerEvent.remove(); return; }
                this.timeLeft--;
                this.updateTimerUI();
                if (this.timeLeft <= 0) {
                    this.failed = true;
                    this.timerEvent.remove();
                    this.time.delayedCall(300, () => this.showFail());
                }
            }
        });
    }

    updateTimerUI() {
        if (!this.timerText) return;
        const color = this.timeLeft <= 5 ? '#ff4444' : '#ffd700';
        this.timerText.setText(`⏱ ${this.timeLeft}s`);
        this.timerText.setColor(color);
        if (this.timeLeft <= 5) {
            this.timerText.setScale(1.1 + Math.sin(this.time.now / 150) * 0.1);
        } else {
            this.timerText.setScale(1);
        }
    }

    // ---- UI ----
    drawUI() {
        // Top bar
        const topBg = this.add.graphics().setDepth(20);
        topBg.fillStyle(0xffffff, 0.03);
        topBg.fillRoundedRect(10, 6, this.w - 20, 54, 14);

        this.add.text(48, 18, `第 ${this.currentLevel + 1} 关`, {
            fontSize: '15px', fontStyle: 'bold', color: '#ffffff'
        }).setDepth(21);

        this.add.text(48, 38, LEVEL_NAMES[this.currentLevel] || '末日筑路', {
            fontSize: '11px', color: '#8a8a9a'
        }).setDepth(21);

        this.add.text(26, 26, '🛤️', { fontSize: '18px' }).setDepth(21);

        this.timerText = this.add.text(this.w - 30, 28, `⏱ ${TIMER_SECONDS}s`, {
            fontSize: '15px', fontStyle: 'bold', color: '#ffd700'
        }).setOrigin(1, 0.5).setDepth(21);

        this.hintText = this.add.text(this.w / 2, this.h - 20, '选择一个方块开始筑路', {
            fontSize: '12px', color: '#8a8a9a'
        }).setOrigin(0.5).setDepth(21);

        this.drawButtons();
    }

    drawButtons() {
        // Destroy old buttons
        if (this.undoBtn) this.undoBtn.destroy();
        if (this.resetBtn) this.resetBtn.destroy();

        const btnY = this.gridOffsetY + this.cellSize * this.gridSize + 80;
        const btnW = 100;
        const btnH = 36;
        const gap = 8;
        const totalBtnW = btnW * 2 + gap;
        const startX = (this.w - totalBtnW) / 2;

        // Undo button
        const undoBg = this.add.graphics().setDepth(20);
        undoBg.fillStyle(0xffffff, 0.05);
        undoBg.lineStyle(1, 0xffd700, 0.2);
        undoBg.fillRoundedRect(startX, btnY, btnW, btnH, 10);
        undoBg.strokeRoundedRect(startX, btnY, btnW, btnH, 10);

        this.undoBtn = this.add.container(startX + btnW / 2, btnY + btnH / 2, [undoBg,
            this.add.text(0, 0, '↩️ 撤销', { fontSize: '13px', fontStyle: 'bold', color: '#fff' }).setOrigin(0.5)
        ]).setDepth(20);

        this.undoBtn.setSize(btnW, btnH);
        this.undoBtn.setInteractive({ useHandCursor: true });
        this.undoBtn.on('pointerdown', () => this.undo());

        // Reset button
        const resetBg = this.add.graphics().setDepth(20);
        const resetX = startX + btnW + gap;
        resetBg.fillStyle(0xffffff, 0.05);
        resetBg.lineStyle(1, 0xffd700, 0.2);
        resetBg.fillRoundedRect(resetX, btnY, btnW, btnH, 10);
        resetBg.strokeRoundedRect(resetX, btnY, btnW, btnH, 10);

        this.resetBtn = this.add.container(resetX + btnW / 2, btnY + btnH / 2, [resetBg,
            this.add.text(0, 0, '🔃 重置', { fontSize: '13px', fontStyle: 'bold', color: '#fff' }).setOrigin(0.5)
        ]).setDepth(20);

        this.resetBtn.setSize(btnW, btnH);
        this.resetBtn.setInteractive({ useHandCursor: true });
        this.resetBtn.on('pointerdown', () => this.loadLevel(this.currentLevel));
    }

    setHint(text) {
        if (this.hintText) this.hintText.setText(text);
    }

    // ---- Win / Fail ----
    showWin() {
        const used = this.placedHistory.length;
        const pathSet = this.findPath();

        // Glow path cells
        const cs = this.cellSize;
        const ox = this.gridOffsetX;
        const oy = this.gridOffsetY;
        for (const key of pathSet) {
            const r = Math.floor(key / this.gridSize);
            const c = key % this.gridSize;
            const rect = this.add.rectangle(ox + c * cs + cs/2, oy + r * cs + cs/2, cs - 4, cs - 4, COLORS.pathGlow, 0.3).setDepth(3);
            this.tweens.add({ targets: rect, alpha: 0.6, duration: 500, yoyo: true, repeat: -1 });
        }

        // Modal
        const overlay = this.add.rectangle(this.w/2, this.h/2, this.w, this.h, 0x000000, 0.7).setDepth(200);
        const box = this.add.graphics().setDepth(201);
        const bw = 300, bh = 180;
        const bx = this.w/2 - bw/2, by = this.h/2 - bh/2;
        box.fillStyle(0x1a1a2e, 1);
        box.fillRoundedRect(bx, by, bw, bh, 20);
        box.lineStyle(1, 0xffd700, 0.3);
        box.strokeRoundedRect(bx, by, bw, bh, 20);

        this.add.text(this.w/2, this.h/2 - 40, '🎉 通路达成!', { fontSize: '22px', fontStyle: 'bold', color: '#ffd700' }).setOrigin(0.5).setDepth(202);
        this.add.text(this.w/2, this.h/2, `用了 ${used} 块完成筑路`, { fontSize: '14px', color: '#8a8a9a' }).setOrigin(0.5).setDepth(202);

        const nextBtn = this.add.text(this.w/2, this.h/2 + 50, '下一关 →', {
            fontSize: '15px', fontStyle: 'bold', color: '#000',
            backgroundColor: '#ffd700', padding: { x: 24, y: 10 }
        }).setOrigin(0.5).setDepth(202).setInteractive({ useHandCursor: true});

        nextBtn.on('pointerdown', () => {
            overlay.destroy(); box.destroy();
            this.loadLevel(Math.min(this.currentLevel + 1, LEVELS.length - 1));
        });
    }

    showFail() {
        this.setHint('⏰ 时间到!');

        const overlay = this.add.rectangle(this.w/2, this.h/2, this.w, this.h, 0x000000, 0.7).setDepth(200);
        const box = this.add.graphics().setDepth(201);
        const bw = 300, bh = 180;
        const bx = this.w/2 - bw/2, by = this.h/2 - bh/2;
        box.fillStyle(0x1a1a2e, 1);
        box.fillRoundedRect(bx, by, bw, bh, 20);
        box.lineStyle(1, 0xff4444, 0.3);
        box.strokeRoundedRect(bx, by, bw, bh, 20);

        this.add.text(this.w/2, this.h/2 - 40, '⏰ 时间到!', { fontSize: '22px', fontStyle: 'bold', color: '#ff6b6b' }).setOrigin(0.5).setDepth(202);
        this.add.text(this.w/2, this.h/2, `第 ${this.currentLevel + 1} 关失败，再试试吧`, { fontSize: '14px', color: '#8a8a9a' }).setOrigin(0.5).setDepth(202);

        const retryBtn = this.add.text(this.w/2, this.h/2 + 50, '🔄 再试一次', {
            fontSize: '15px', fontStyle: 'bold', color: '#fff',
            backgroundColor: '#ff4444', padding: { x: 24, y: 10 }
        }).setOrigin(0.5).setDepth(202).setInteractive({ useHandCursor: true });

        retryBtn.on('pointerdown', () => {
            overlay.destroy(); box.destroy();
            this.loadLevel(this.currentLevel);
        });
    }

    update() {
        if (this.timeLeft <= 5 && this.timeLeft > 0 && !this.won && !this.failed) {
            this.updateTimerUI();
        }
    }
}

// ---- Background particles ----
class BgScene extends Phaser.Scene {
    constructor() { super('BgScene'); }
    create() {
        this.graphics = this.add.graphics();
        this.dots = [];
        for (let i = 0; i < 30; i++) {
            this.dots.push({
                x: Math.random() * this.cameras.main.width,
                y: Math.random() * this.cameras.main.height,
                vx: (Math.random() - 0.5) * 0.4,
                vy: (Math.random() - 0.5) * 0.4,
                r: Math.random() * 2 + 0.5,
                a: Math.random() * 0.3 + 0.05,
            });
        }
    }
    update() {
        const g = this.graphics;
        g.clear();
        const w = this.cameras.main.width;
        const h = this.cameras.main.height;
        for (const p of this.dots) {
            p.x += p.vx; p.y += p.vy;
            if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
            if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
            g.fillStyle(0xffd700, p.a);
            g.fillCircle(p.x, p.y, p.r);
        }
    }
}

// ---- Launch ----
const config = {
    type: Phaser.AUTO,
    parent: 'gameContainer',
    width: Math.min(window.innerWidth, 500),
    height: window.innerHeight,
    backgroundColor: '#0a0a12',
    scale: {
        mode: Phaser.Scale.RESIZE,
        autoCenter: Phaser.Scale.CENTER_BOTH,
    },
    scene: [BgScene, GameScene],
    input: {
        touch: { capture: true },
    },
};

const game = new Phaser.Game(config);
