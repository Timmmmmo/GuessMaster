<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>末日锈纪:筑路求生 V3.0.1</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        body{background:#0a0a12;overflow:hidden;user-select:none;font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif}
        canvas{display:block;touch-action:none}
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100}
        .modal-box{background:#1a1a2e;border-radius:20px;padding:30px 40px;text-align:center;max-width:300px;border:1px solid rgba(255,215,0,.3)}
        .modal-box.fail{border-color:rgba(255,68,68,.3)}
        .modal-box h2{color:#ffd700;font-size:22px;margin-bottom:8px}
        .modal-box.fail h2{color:#ff6b6b}
        .modal-box p{color:#8a8a9a;font-size:14px;margin-bottom:20px}
        .modal-box button{padding:10px 24px;border:none;border-radius:12px;font-size:15px;font-weight:bold;cursor:pointer}
        .btn-next{background:#ffd700;color:#000}
        .btn-retry{background:#ff4444;color:#fff}
        .countdown{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:72px;color:#ffd700;font-weight:bold;z-index:200;text-shadow:0 0 20px rgba(255,215,0,.5);animation:pulse .3s ease-in-out}
        @keyframes pulse{0%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.5);opacity:.5}100%{transform:translate(-50%,-50%) scale(1)}}
    </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ---- Constants ----
const PIECE_DEFS = {
    I: { cells:[[0,-1],[0,0],[0,1],[0,2]], color:'#4fc3f7' },
    L: { cells:[[0,-1],[0,0],[0,1],[1,1]], color:'#81c784' },
    J: { cells:[[0,-1],[0,0],[0,1],[-1,1]], color:'#ffb74d' },
    T: { cells:[[0,-1],[0,0],[0,1],[1,0]], color:'#e040fb' },
    S: { cells:[[0,0],[1,0],[0,1],[-1,1]], color:'#ff6b6b' },
    Z: { cells:[[0,0],[-1,0],[0,1],[1,1]], color:'#ffd700' },
    O: { cells:[[0,0],[1,0],[0,1],[1,1]], color:'#ff8c00' },
    I3:{ cells:[[0,-1],[0,0],[0,1]], color:'#64b5f6' },
    L3:{ cells:[[0,0],[0,1],[1,1]], color:'#a5d6a7' },
    DOT:{cells:[[0,0]], color:'#90a4ae' },
    I2:{ cells:[[0,0],[0,1]], color:'#80cbc4' },
};
const LEVELS = [
    { grid:5, start:[2,0], end:[2,4], pieces:['I','I','I3','L3','DOT'], obstacles:[] },
    { grid:5, start:[0,0], end:[4,4], pieces:['I','L','I3','L3','DOT','DOT'], obstacles:[] },
    { grid:6, start:[0,0], end:[5,5], pieces:['I','I','L','T','I3','L3','DOT'], obstacles:[[2,2],[3,3]] },
    { grid:6, start:[1,0], end:[4,5], pieces:['I','I','L','J','T','I3','L3','DOT'], obstacles:[[2,2],[3,3],[0,3]] },
    { grid:7, start:[0,0], end:[6,6], pieces:['I','I','L','J','T','S','Z','I3','DOT','DOT'], obstacles:[[2,2],[3,3],[4,4],[1,4]] },
    { grid:7, start:[3,0], end:[3,6], pieces:['I','I','I','L','J','I3','I3','L3','DOT'], obstacles:[[1,2],[5,2],[1,4],[5,4],[3,3]] },
    { grid:8, start:[0,0], end:[7,7], pieces:['I','I','I','L','J','T','S','Z','O','I3','I3','L3','DOT'], obstacles:[[2,2],[2,5],[5,2],[5,5],[3,4],[4,3]] },
    { grid:8, start:[0,7], end:[7,0], pieces:['I','I','L','L','J','T','T','S','Z','I3','L3','L3','DOT','DOT'], obstacles:[[3,3],[4,4],[2,5],[5,2],[1,3],[6,4]] },
    { grid:9, start:[0,0], end:[8,8], pieces:['I','I','I','I','L','J','T','S','Z','O','I3','I3','L3','DOT','DOT'], obstacles:[[3,3],[4,4],[5,5],[2,6],[6,2],[1,4],[7,4]] },
    { grid:10, start:[0,0], end:[9,9], pieces:['I','I','I','I','L','L','J','J','T','T','S','Z','O','I3','I3','L3','L3','DOT'], obstacles:[[3,3],[4,4],[5,5],[6,6],[2,7],[7,2],[1,5],[8,4]] },
];
const LEVEL_NAMES = ['废墟起步','对角求生','暗坑初现','迂回前进','绝地逢生','中路突围','四方围困','逆流而上','深渊通道','终极筑路'];
const TIMER_SECONDS = 20;

// ---- State ----
let W, H, dpr;
let gridSize, cellSize, gridOffsetX, gridOffsetY;
let gridData, startPos, endPos, candidates, placedHistory;
let currentLevel = 0;
let won = false, failed = false;
let timeLeft = TIMER_SECONDS, timerInterval = null;
let hint = '拖动方块到棋盘上';

// Drag
let dragging = false, dragIdx = -1, dragOffX = 0, dragOffY = 0, dragAnchorX = 0, dragAnchorY = 0;
let previewAnchor = null, previewValid = false;
let lastPointerX = 0, lastPointerY = 0;

// Particles
let particles = [];

// Countdown
let countdownActive = false;

// Flash effects
let flashCells = [];

// ---- Resize ----
function resize() {
    dpr = window.devicePixelRatio || 1;
    W = Math.min(window.innerWidth || 375, 500);
    H = window.innerHeight || 667;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    calcLayout();
}
window.addEventListener('resize', resize);

function calcLayout() {
    if (!gridSize) return;
    const maxW = Math.min(W - 20, 420);
    const maxH = H * 0.36;
    cellSize = Math.floor(Math.min(maxW / gridSize, maxH / gridSize));
    const gridPx = cellSize * gridSize;
    gridOffsetX = Math.floor((W - gridPx) / 2);
    gridOffsetY = 68;
}

// ---- Particles ----
function initParticles() {
    particles = [];
    for (let i = 0; i < 25; i++) {
        particles.push({
            x: Math.random() * W, y: Math.random() * H,
            vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
            r: Math.random() * 2 + 0.5, a: Math.random() * 0.25 + 0.05,
        });
    }
}
function updateParticles() {
    for (const p of particles) {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
    }
}
function drawParticles() {
    for (const p of particles) {
        ctx.globalAlpha = p.a;
        ctx.fillStyle = '#ffd700';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
}

// ---- Draw ----
function draw() {
    ctx.clearRect(0, 0, W, H);
    drawParticles();
    drawTopBar();
    drawGrid();
    drawCandidates();
    drawButtons();
    drawHint();
    drawFlash();
    if (dragging) drawDragPiece();
    drawPreview();
}

function drawTopBar() {
    ctx.fillStyle = 'rgba(255,255,255,0.03)';
    roundRect(ctx, 10, 6, W - 20, 54, 14);
    ctx.fill();

    ctx.font = 'bold 15px sans-serif';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'left';
    ctx.fillText('🛤️  第 ' + (currentLevel + 1) + ' 关', 36, 34);

    ctx.font = '11px sans-serif';
    ctx.fillStyle = '#8a8a9a';
    ctx.fillText(LEVEL_NAMES[currentLevel] || '末日筑路', 36, 52);

    // Timer
    const tc = timeLeft <= 5 ? '#ff4444' : '#ffd700';
    ctx.font = 'bold 15px sans-serif';
    ctx.fillStyle = tc;
    ctx.textAlign = 'right';
    ctx.fillText('⏱ ' + timeLeft + 's', W - 20, 38);
    ctx.textAlign = 'left';
}

function drawGrid() {
    const cs = cellSize, ox = gridOffsetX, oy = gridOffsetY, gs = gridSize;

    // Background
    ctx.fillStyle = '#0d0d1a';
    roundRect(ctx, ox - 4, oy - 4, cs * gs + 8, cs * gs + 8, 12);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,215,0,0.15)';
    ctx.lineWidth = 1;
    roundRect(ctx, ox - 4, oy - 4, cs * gs + 8, cs * gs + 8, 12);
    ctx.stroke();

    for (let r = 0; r < gs; r++) {
        for (let c = 0; c < gs; c++) {
            const x = ox + c * cs, y = oy + r * cs;
            ctx.strokeStyle = 'rgba(26,26,46,0.5)';
            ctx.lineWidth = 0.5;
            ctx.strokeRect(x, y, cs, cs);

            if (gridData[r][c] === 2) {
                ctx.fillStyle = 'rgba(42,21,32,0.7)';
                ctx.fillRect(x + 1, y + 1, cs - 2, cs - 2);
                ctx.strokeStyle = 'rgba(102,51,51,0.5)';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(x + cs * 0.25, y + cs * 0.25);
                ctx.lineTo(x + cs * 0.75, y + cs * 0.75);
                ctx.moveTo(x + cs * 0.75, y + cs * 0.25);
                ctx.lineTo(x + cs * 0.25, y + cs * 0.75);
                ctx.stroke();
            } else if (gridData[r][c] === 1) {
                ctx.fillStyle = 'rgba(129,199,132,0.35)';
                ctx.fillRect(x + 1, y + 1, cs - 2, cs - 2);
                ctx.strokeStyle = 'rgba(129,199,132,0.2)';
                ctx.lineWidth = 1;
                ctx.strokeRect(x + 1, y + 1, cs - 2, cs - 2);
            }
        }
    }

    // Markers
    drawMarker(startPos, '#4fc3f7', 'S');
    drawMarker(endPos, '#ff6b6b', 'E');
}

function drawMarker(pos, color, label) {
    const cs = cellSize, x = gridOffsetX + pos[1] * cs, y = gridOffsetY + pos[0] * cs;
    ctx.fillStyle = color + '26';
    ctx.fillRect(x + 1, y + 1, cs - 2, cs - 2);
    ctx.strokeStyle = color + '66';
    ctx.lineWidth = 2;
    ctx.strokeRect(x + 1, y + 1, cs - 2, cs - 2);
    ctx.font = 'bold ' + Math.max(12, cs * 0.45) + 'px sans-serif';
    ctx.fillStyle = color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, x + cs / 2, y + cs / 2);
    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
}

function drawCandidates() {
    const pcs = 26; // preview cell size
    const totalCards = candidates.length;
    const gap = 6;

    // Calculate card sizes
    const cardSizes = candidates.map(cand => {
        let minR = Infinity, maxR = -Infinity, minC = Infinity, maxC = -Infinity;
        for (const [r, c] of cand.cells) {
            minR = Math.min(minR, r); maxR = Math.max(maxR, r);
            minC = Math.min(minC, c); maxC = Math.max(maxC, c);
        }
        return { w: (maxC - minC + 1) * pcs + 14, h: (maxR - minR + 1) * pcs + 14, minR, maxR, minC, maxC };
    });

    const totalW = cardSizes.reduce((s, c) => s + c.w, 0) + (totalCards - 1) * gap;
    const startX = Math.max(8, Math.floor((W - totalW) / 2));
    const baseY = gridOffsetY + cellSize * gridSize + 16;

    ctx.font = '11px sans-serif';
    ctx.fillStyle = '#8a8a9a';
    ctx.textAlign = 'center';
    ctx.fillText('拖动方块到棋盘上', W / 2, baseY);
    ctx.textAlign = 'left';

    let curX = startX;
    // Store card rects for hit testing
    window._cardRects = [];

    for (let i = 0; i < totalCards; i++) {
        const cand = candidates[i];
        const sz = cardSizes[i];
        const cw = sz.w, ch = sz.h;
        const cx = curX, cy = baseY + 8;

        // Card bg
        ctx.fillStyle = cand.used ? 'rgba(255,255,255,0.02)' : 'rgba(255,255,255,0.05)';
        roundRect(ctx, cx, cy, cw, ch, 8);
        ctx.fill();
        ctx.strokeStyle = cand.used ? 'rgba(51,51,51,0.1)' : 'rgba(255,215,0,0.25)';
        ctx.lineWidth = 2;
        roundRect(ctx, cx, cy, cw, ch, 8);
        ctx.stroke();

        if (cand.used) ctx.globalAlpha = 0.2;

        // Piece cells
        for (const [r, c] of cand.cells) {
            const px = cx + (c - sz.minC) * pcs + 7;
            const py = cy + (r - sz.minR) * pcs + 7;
            ctx.fillStyle = cand.def.color;
            ctx.fillRect(px + 1, py + 1, pcs - 2, pcs - 2);
            ctx.strokeStyle = 'rgba(255,255,255,0.25)';
            ctx.lineWidth = 1;
            ctx.strokeRect(px + 1, py + 1, pcs - 2, pcs - 2);
        }

        ctx.globalAlpha = 1;

        // Store hit rect
        if (!cand.used) {
            window._cardRects.push({ x: cx - 6, y: cy - 6, w: cw + 12, h: ch + 12, idx: i });
        }

        curX += cw + gap;
    }
}

function drawButtons() {
    const btnY = gridOffsetY + cellSize * gridSize + 90;
    const btnW = 100, btnH = 38, gap = 10;
    const totalW = btnW * 2 + gap;
    const startX = (W - totalW) / 2;

    window._btnRects = [];

    // Undo
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    roundRect(ctx, startX, btnY, btnW, btnH, 10);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,215,0,0.2)';
    ctx.lineWidth = 1;
    roundRect(ctx, startX, btnY, btnW, btnH, 10);
    ctx.stroke();
    ctx.font = 'bold 13px sans-serif';
    ctx.fillStyle = '#fff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('↩️ 撤销', startX + btnW / 2, btnY + btnH / 2);
    window._btnRects.push({ x: startX, y: btnY, w: btnW, h: btnH, action: 'undo' });

    // Reset
    const rx = startX + btnW + gap;
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    roundRect(ctx, rx, btnY, btnW, btnH, 10);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,215,0,0.2)';
    ctx.lineWidth = 1;
    roundRect(ctx, rx, btnY, btnW, btnH, 10);
    ctx.stroke();
    ctx.fillText('🔃 重置', rx + btnW / 2, btnY + btnH / 2);
    window._btnRects.push({ x: rx, y: btnY, w: btnW, h: btnH, action: 'reset' });

    ctx.textAlign = 'left';
    ctx.textBaseline = 'alphabetic';
}

function drawHint() {
    ctx.font = '12px sans-serif';
    ctx.fillStyle = '#8a8a9a';
    ctx.textAlign = 'center';
    ctx.fillText(hint, W / 2, H - 18);
    ctx.textAlign = 'left';
}

function drawDragPiece() {
    if (dragIdx < 0) return;
    const cand = candidates[dragIdx];
    const cs = cellSize;
    let minR = Infinity, maxR = -Infinity, minC = Infinity, maxC = -Infinity;
    for (const [r, c] of cand.cells) {
        minR = Math.min(minR, r); maxR = Math.max(maxR, r);
        minC = Math.min(minC, c); maxC = Math.max(maxC, c);
    }
    const offX = (maxC - minC + 1) * cs / 2;
    const offY = (maxR - minR + 1) * cs / 2;

    ctx.globalAlpha = 0.7;
    for (const [r, c] of cand.cells) {
        const x = lastPointerX + (c - minC) * cs - offX;
        const y = lastPointerY + (r - minR) * cs - offY;
        ctx.fillStyle = cand.def.color;
        ctx.fillRect(x + 1, y + 1, cs - 2, cs - 2);
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth = 2;
        ctx.strokeRect(x + 1, y + 1, cs - 2, cs - 2);
    }
    ctx.globalAlpha = 1;
}

function drawPreview() {
    if (!dragging || !previewAnchor) return;
    const cs = cellSize, ox = gridOffsetX, oy = gridOffsetY;
    const [ar, ac] = previewAnchor;
    const cand = candidates[dragIdx];

    for (const [r, c] of cand.cells) {
        const gr = ar + r, gc = ac + c;
        if (gr < 0 || gr >= gridSize || gc < 0 || gc >= gridSize) continue;
        ctx.fillStyle = previewValid ? 'rgba(255,215,0,0.35)' : 'rgba(255,51,51,0.35)';
        ctx.fillRect(ox + gc * cs + 2, oy + gr * cs + 2, cs - 4, cs - 4);
    }
}

function drawFlash() {
    const now = Date.now();
    flashCells = flashCells.filter(f => now - f.t < 300);
    for (const f of flashCells) {
        const elapsed = now - f.t;
        const a = 0.5 * (1 - elapsed / 300);
        ctx.fillStyle = `rgba(255,255,255,${a})`;
        ctx.fillRect(gridOffsetX + f.c * cellSize + 1, gridOffsetY + f.r * cellSize + 1, cellSize - 2, cellSize - 2);
    }
}

// ---- Game Logic ----
function loadLevel(idx) {
    currentLevel = idx;
    const lv = LEVELS[idx] || LEVELS[LEVELS.length - 1];
    gridSize = lv.grid;
    startPos = [...lv.start];
    endPos = [...lv.end];
    won = false;
    failed = false;
    placedHistory = [];
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }

    gridData = [];
    for (let r = 0; r < gridSize; r++) {
        gridData[r] = [];
        for (let c = 0; c < gridSize; c++) gridData[r][c] = 0;
    }
    for (const [r, c] of lv.obstacles) gridData[r][c] = 2;

    candidates = lv.pieces.map(name => {
        const def = PIECE_DEFS[name];
        if (!def) {
            console.error('Unknown piece:', name);
            return { name, def: PIECE_DEFS.DOT, cells: [[0,0]], used: false };
        }
        return { name, def, cells: def.cells.map(c => [...c]), used: false };
    });

    hint = '拖动方块到棋盘上';
    timeLeft = TIMER_SECONDS;
    flashCells = [];
    dragging = false;
    dragIdx = -1;
    countdownActive = false;

    calcLayout();
    draw();
    startCountdown();
}

function startCountdown() {
    countdownActive = true;
    let count = 3;
    function tick() {
        if (count > 0) {
            draw();
            // Draw countdown overlay
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, W, H);
            ctx.font = 'bold 72px sans-serif';
            ctx.fillStyle = '#ffd700';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(String(count), W / 2, H / 2);
            ctx.textAlign = 'left';
            ctx.textBaseline = 'alphabetic';
            count--;
            setTimeout(tick, 600);
        } else {
            draw();
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.fillRect(0, 0, W, H);
            ctx.font = 'bold 72px sans-serif';
            ctx.fillStyle = '#ffd700';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('GO!', W / 2, H / 2);
            ctx.textAlign = 'left';
            ctx.textBaseline = 'alphabetic';
            countdownActive = false;
            setTimeout(() => {
                startTimer();
                draw();
            }, 400);
        }
    }
    tick();
}

function startTimer() {
    if (timerInterval) clearInterval(timerInterval);
    timeLeft = TIMER_SECONDS;
    timerInterval = setInterval(() => {
        if (won || failed || countdownActive) return;
        timeLeft--;
        draw();
        if (timeLeft <= 0) {
            failed = true;
            clearInterval(timerInterval);
            timerInterval = null;
            setTimeout(showFail, 300);
        }
    }, 1000);
}

function placePiece(idx, anchorR, anchorC) {
    const cand = candidates[idx];
    const absCells = cand.cells.map(([r, c]) => [anchorR + r, anchorC + c]);
    for (const [r, c] of absCells) {
        if (r < 0 || r >= gridSize || c < 0 || c >= gridSize) return false;
        if (gridData[r][c] === 2 || gridData[r][c] === 1) return false;
    }
    for (const [r, c] of absCells) gridData[r][c] = 1;
    placedHistory.push({ idx, anchorR, anchorC, cells: absCells });
    cand.used = true;

    // Flash
    const now = Date.now();
    for (const [r, c] of absCells) flashCells.push({ r, c, t: now });

    hint = '✅ 方块已放置';
    draw();

    if (checkWin()) {
        won = true;
        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        setTimeout(showWin, 500);
    }
    return true;
}

function undo() {
    if (placedHistory.length === 0 || won || failed) return;
    const last = placedHistory.pop();
    for (const [r, c] of last.cells) gridData[r][c] = 0;
    candidates[last.idx].used = false;
    hint = '↩️ 已撤销';
    draw();
}

function checkWin() {
    const gs = gridSize;
    const visited = Array.from({ length: gs }, () => Array(gs).fill(false));
    const queue = [startPos];
    visited[startPos[0]][startPos[1]] = true;
    const dirs = [[0, 1], [0, -1], [1, 0], [-1, 0]];
    while (queue.length) {
        const [r, c] = queue.shift();
        if (r === endPos[0] && c === endPos[1]) return true;
        for (const [dr, dc] of dirs) {
            const nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < gs && nc >= 0 && nc < gs && !visited[nr][nc] && gridData[nr][nc] === 1) {
                visited[nr][nc] = true;
                queue.push([nr, nc]);
            }
        }
    }
    return false;
}

function findPath() {
    const gs = gridSize;
    const visited = Array.from({ length: gs }, () => Array(gs).fill(false));
    const parent = Array.from({ length: gs }, () => Array(gs).fill(null));
    const queue = [startPos];
    visited[startPos[0]][startPos[1]] = true;
    const dirs = [[0, 1], [0, -1], [1, 0], [-1, 0]];
    while (queue.length) {
        const [r, c] = queue.shift();
        if (r === endPos[0] && c === endPos[1]) {
            const path = new Set();
            let cur = [r, c];
            while (cur) { path.add(cur[0] * gs + cur[1]); cur = parent[cur[0]][cur[1]]; }
            return path;
        }
        for (const [dr, dc] of dirs) {
            const nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < gs && nc >= 0 && nc < gs && !visited[nr][nc] && gridData[nr][nc] === 1) {
                visited[nr][nc] = true;
                parent[nr][nc] = [r, c];
                queue.push([nr, nc]);
            }
        }
    }
    return new Set();
}

// ---- Modals ----
function showModal(content, className) {
    // Remove existing
    document.querySelectorAll('.modal-overlay').forEach(e => e.remove());
    const div = document.createElement('div');
    div.className = 'modal-overlay';
    div.innerHTML = `<div class="modal-box ${className || ''}">${content}</div>`;
    document.body.appendChild(div);
    return div;
}

function showWin() {
    const pathSet = findPath();
    // Draw glow path
    draw();
    const cs = cellSize, ox = gridOffsetX, oy = gridOffsetY;
    for (const key of pathSet) {
        const r = Math.floor(key / gridSize), c = key % gridSize;
        ctx.fillStyle = 'rgba(129,199,132,0.4)';
        ctx.fillRect(ox + c * cs + 2, oy + r * cs + 2, cs - 4, cs - 4);
    }

    const used = placedHistory.length;
    const div = showModal(`
        <h2>🎉 通路达成!</h2>
        <p>用了 ${used} 块完成筑路</p>
        <button class="btn-next" id="btnNext">下一关 →</button>
    `);
    const btnNext = document.getElementById('btnNext');
    if (btnNext) btnNext.onclick = () => {
        div.remove();
        loadLevel(Math.min(currentLevel + 1, LEVELS.length - 1));
    };
}

function showFail() {
    hint = '⏰ 时间到!';
    draw();
    const div = showModal(`
        <h2>⏰ 时间到!</h2>
        <p>第 ${currentLevel + 1} 关失败，再试试吧</p>
        <button class="btn-retry" id="btnRetry">🔄 再试一次</button>
    `, 'fail');
    const btnRetry = document.getElementById('btnRetry');
    if (btnRetry) btnRetry.onclick = () => {
        div.remove();
        loadLevel(currentLevel);
    };
}

// ---- Input ----
function getXY(e) {
    const rect = canvas.getBoundingClientRect();
    if (e.touches && e.touches.length > 0) {
        return [e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top];
    }
    return [e.clientX - rect.left, e.clientY - rect.top];
}

function hitTest(x, y, rects) {
    for (const r of rects) {
        if (x >= r.x && x < r.x + r.w && y >= r.y && y < r.y + r.h) return r;
    }
    return null;
}

function onPointerDown(e) {
    if (won || failed || countdownActive) return;
    e.preventDefault();
    const [x, y] = getXY(e);
    lastPointerX = x;
    lastPointerY = y;

    // Check buttons
    const btn = hitTest(x, y, window._btnRects || []);
    if (btn) {
        if (btn.action === 'undo') undo();
        else if (btn.action === 'reset') loadLevel(currentLevel);
        return;
    }

    // Check candidate cards
    const card = hitTest(x, y, window._cardRects || []);
    if (card) {
        dragging = true;
        dragIdx = card.idx;
        draw();
    }
}

function onPointerMove(e) {
    if (!dragging) return;
    e.preventDefault();
    const [x, y] = getXY(e);
    lastPointerX = x;
    lastPointerY = y;

    // Calculate preview
    const cs = cellSize, ox = gridOffsetX, oy = gridOffsetY;
    const cand = candidates[dragIdx];
    let minR = Infinity, maxR = -Infinity, minC = Infinity, maxC = -Infinity;
    for (const [r, c] of cand.cells) {
        minR = Math.min(minR, r); maxR = Math.max(maxR, r);
        minC = Math.min(minC, c); maxC = Math.max(maxC, c);
    }
    const gc = Math.floor((x - ox) / cs);
    const gr = Math.floor((y - oy) / cs);
    const anchorR = Math.round(gr - (minR + maxR) / 2);
    const anchorC = Math.round(gc - (minC + maxC) / 2);

    let valid = true;
    for (const [r, c] of cand.cells) {
        const ar = anchorR + r, ac = anchorC + c;
        if (ar < 0 || ar >= gridSize || ac < 0 || ac >= gridSize) valid = false;
        else if (gridData[ar][ac] === 2 || gridData[ar][ac] === 1) valid = false;
    }
    previewAnchor = [anchorR, anchorC];
    previewValid = valid;
    draw();
}

function onPointerUp(e) {
    if (!dragging) return;
    e.preventDefault();
    const [x, y] = lastPointerX !== undefined ? [lastPointerX, lastPointerY] : getXY(e);
    dragging = false;

    const cs = cellSize, ox = gridOffsetX, oy = gridOffsetY, gs = gridSize;

    if (x >= ox && x < ox + cs * gs && y >= oy && y < oy + cs * gs && previewValid) {
        placePiece(dragIdx, previewAnchor[0], previewAnchor[1]);
    } else if (x < ox || x >= ox + cs * gs || y < oy || y >= oy + cs * gs) {
        hint = '放到了棋盘外面哦';
    } else if (!previewValid) {
        hint = '❌ 无法放在这里';
    }

    dragIdx = -1;
    previewAnchor = null;
    previewValid = false;
    draw();
}

canvas.addEventListener('pointerdown', onPointerDown);
canvas.addEventListener('pointermove', onPointerMove);
canvas.addEventListener('pointerup', onPointerUp);
canvas.addEventListener('pointercancel', onPointerUp);
canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });

// ---- Helpers ----
function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
}

// ---- Game loop ----
function loop() {
    updateParticles();
    draw();
    requestAnimationFrame(loop);
}

// ---- Init ----
window._cardRects = [];
window._btnRects = [];
resize();
initParticles();
loadLevel(0);
loop();
</script>
</body>
</html>
