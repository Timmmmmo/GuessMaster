<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>末日锈纪:一笔觉醒 V3.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --bg-primary: #0a0a12;
            --bg-secondary: #12121f;
            --accent-gold: #ffd700;
            --accent-glow: #ffed4e;
            --color-human: #4fc3f7;
            --color-zombie: #81c784;
            --color-robot: #ffb74d;
            --color-particle: #e040fb;
            --text-primary: #ffffff;
            --text-secondary: #8a8a9a;
            --energy-full: #ffd700;
            --energy-mid: #ffaa00;
            --energy-low: #ff4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .particle-bg {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }

        .game-container {
            position: relative; z-index: 1;
            display: flex; flex-direction: column;
            align-items: center; min-height: 100vh;
            padding: 16px; max-width: 500px;
            margin: 0 auto;
        }

        /* 顶部状态栏 */
        .top-bar {
            width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 16px;
            background: linear-gradient(180deg, rgba(255,215,0,0.08) 0%, transparent 100%);
            border-radius: 16px; margin-bottom: 10px;
            gap: 10px;
        }

        .level-badge {
            display: flex; align-items: center; gap: 8px;
            flex-shrink: 0;
        }

        .level-icon {
            width: 34px; height: 34px;
            background: linear-gradient(135deg, var(--accent-gold), #ff8c00);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
            box-shadow: 0 2px 8px rgba(255,215,0,0.3);
        }

        .level-info { font-size: 13px; font-weight: 600; }
        .level-name { font-size: 11px; color: var(--text-secondary); }

        .energy-bar {
            display: flex; flex-direction: column; align-items: center;
            flex-shrink: 0;
        }

        .energy-label {
            font-size: 10px; color: var(--text-secondary); margin-bottom: 4px;
            display: flex; align-items: center; gap: 4px;
        }

        .energy-orbs {
            display: flex; gap: 4px;
        }

        .energy-orb {
            width: 14px; height: 14px;
            border-radius: 50%;
            background: rgba(255,215,0,0.15);
            border: 1px solid rgba(255,215,0,0.3);
            transition: all 0.3s ease;
        }

        .energy-orb.full {
            background: var(--energy-full);
            border-color: var(--energy-full);
            box-shadow: 0 0 8px rgba(255,215,0,0.5);
        }

        .energy-orb.mid {
            background: var(--energy-mid);
            border-color: var(--energy-mid);
            box-shadow: 0 0 6px rgba(255,170,0,0.4);
        }

        .energy-orb.low {
            background: var(--energy-low);
            border-color: var(--energy-low);
            box-shadow: 0 0 4px rgba(255,68,68,0.4);
            animation: energyPulse 1s ease infinite;
        }

        @keyframes energyPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .timer-ring {
            position: relative; width: 52px; height: 52px;
            flex-shrink: 0;
        }

        .timer-ring svg {
            transform: rotate(-90deg);
            width: 52px; height: 52px;
        }

        .timer-ring circle {
            fill: none; stroke-width: 4;
        }

        .timer-bg { stroke: rgba(255,255,255,0.1); }

        .timer-progress {
            stroke: var(--accent-gold);
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s ease;
        }

        .timer-text {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 14px; font-weight: bold;
            color: var(--accent-gold);
        }

        .score-display { text-align: right; flex-shrink: 0; }
        .score-label { font-size: 11px; color: var(--text-secondary); }
        .score-value { font-size: 18px; font-weight: bold; color: var(--accent-glow); }

        /* 游戏区域 */
        .game-board {
            position: relative;
            width: calc(100vw - 32px); max-width: 450px;
            aspect-ratio: 1;
            background: var(--bg-secondary);
            border-radius: 20px; overflow: hidden;
            box-shadow:
                0 0 0 2px rgba(255,215,0,0.15),
                0 16px 50px rgba(0,0,0,0.5),
                inset 0 0 40px rgba(255,215,0,0.03);
            touch-action: none;
        }

        .board-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
        }

        #grid-canvas { z-index: 1; }
        #path-canvas { z-index: 2; }
        #input-canvas { z-index: 3; }
        #fx-canvas { z-index: 4; pointer-events: none; }

        /* 进度指示 */
        .progress-bar {
            width: 100%; height: 5px;
            background: rgba(255,255,255,0.08);
            border-radius: 3px; margin: 12px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-gold), var(--color-particle));
            border-radius: 3px; transition: width 0.3s ease;
        }

        /* 操作按钮 */
        .controls {
            display: flex; gap: 10px; margin-top: 6px;
        }

        .ctrl-btn {
            display: flex; align-items: center; gap: 5px;
            padding: 10px 16px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: var(--text-primary);
            font-size: 13px; cursor: pointer; transition: all 0.2s ease;
        }

        .ctrl-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.13); }
        .ctrl-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .ctrl-btn svg { width: 16px; height: 16px; }

        /* 底部导航 */
        .bottom-nav {
            display: flex; gap: 8px; margin-top: 12px;
        }

        .nav-btn {
            padding: 10px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px; color: var(--text-secondary);
            font-size: 12px; cursor: pointer; transition: all 0.2s ease;
            display: flex; align-items: center; gap: 5px;
        }

        .nav-btn:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }
        .nav-btn.active { background: rgba(255,215,0,0.1); border-color: rgba(255,215,0,0.3); color: var(--accent-gold); }

        .nav-badge {
            background: var(--accent-gold); color: #000;
            border-radius: 10px; padding: 1px 6px;
            font-size: 10px; font-weight: bold;
        }

        /* 关卡提示 */
        .level-hint {
            margin-top: 14px; padding: 10px 16px;
            background: rgba(255,215,0,0.06);
            border: 1px solid rgba(255,215,0,0.12);
            border-radius: 12px; font-size: 12px;
            color: var(--text-secondary); text-align: center; max-width: 100%;
            min-height: 42px; display: flex; align-items: center; justify-content: center;
        }

        .level-hint strong { color: var(--accent-gold); }

        /* ========== 成就系统 ========== */
        .panel-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex; align-items: center; justify-content: center;
            z-index: 900; opacity: 0; visibility: hidden;
            transition: all 0.3s ease;
        }

        .panel-overlay.active { opacity: 1; visibility: visible; }

        .panel-box {
            background: linear-gradient(145deg, #1a1a2e, #0f0f1a);
            border-radius: 24px; max-width: 380px; width: 92%;
            max-height: 85vh; overflow: hidden;
            transform: scale(0.9); transition: transform 0.3s ease;
            border: 1px solid rgba(255,215,0,0.15);
            display: flex; flex-direction: column;
        }

        .panel-overlay.active .panel-box { transform: scale(1); }

        .panel-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px 24px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .panel-title { font-size: 18px; font-weight: bold; color: var(--accent-gold); }

        .panel-close {
            width: 32px; height: 32px;
            background: rgba(255,255,255,0.08);
            border-radius: 50%; border: none;
            color: var(--text-secondary); font-size: 20px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }

        .panel-close:hover { background: rgba(255,255,255,0.15); color: #fff; }

        .panel-content {
            padding: 16px 20px;
            overflow-y: auto; max-height: 60vh;
        }

        /* 成就列表 */
        .achievement-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .achievement-item {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px; padding: 14px 10px;
            text-align: center; cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .achievement-item:hover { background: rgba(255,255,255,0.08); }

        .achievement-item.unlocked {
            background: rgba(255,215,0,0.06);
            border-color: rgba(255,215,0,0.2);
        }

        .achievement-icon {
            font-size: 28px; margin-bottom: 6px;
            display: block;
        }

        .achievement-name {
            font-size: 11px; color: var(--text-secondary); line-height: 1.3;
        }

        .achievement-item.unlocked .achievement-name { color: var(--accent-gold); }

        .achievement-lock {
            font-size: 10px; color: rgba(255,255,255,0.2);
            margin-top: 4px;
        }

        .achievement-item.unlocked .achievement-lock { display: none; }

        .achievements-progress {
            font-size: 12px; color: var(--text-secondary);
            text-align: center; margin-bottom: 12px;
        }

        .achievements-progress span { color: var(--accent-gold); font-weight: bold; }

        /* 每日挑战 */
        .daily-challenge {
            background: rgba(255,215,0,0.06);
            border: 1px solid rgba(255,215,0,0.15);
            border-radius: 16px; padding: 20px;
            text-align: center;
        }

        .daily-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px;
        }

        .daily-title {
            font-size: 15px; font-weight: bold; color: var(--accent-gold);
            display: flex; align-items: center; gap: 6px;
        }

        .daily-date { font-size: 11px; color: var(--text-secondary); }

        .daily-info { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; }

        .daily-stats {
            display: flex; justify-content: center; gap: 30px; margin-bottom: 16px;
        }

        .daily-stat { text-align: center; }
        .daily-stat-val { font-size: 22px; font-weight: bold; color: var(--accent-gold); }
        .daily-stat-label { font-size: 11px; color: var(--text-secondary); }

        .daily-btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, var(--accent-gold), #ff8c00);
            border: none; border-radius: 12px;
            color: #000; font-size: 15px; font-weight: bold;
            cursor: pointer; transition: all 0.2s;
        }

        .daily-btn:active { transform: scale(0.97); }
        .daily-btn.completed { background: rgba(255,255,255,0.1); color: var(--text-secondary); cursor: default; }

        /* ========== 剧情对话框 ========== */
        .dialog-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; opacity: 0; visibility: hidden;
            transition: all 0.4s ease;
        }

        .dialog-overlay.active { opacity: 1; visibility: visible; }

        .dialog-box {
            background: linear-gradient(145deg, #1a1a2e, #0f0f1a);
            padding: 28px; border-radius: 22px;
            max-width: 320px; width: 90%; text-align: center;
            transform: scale(0.9); transition: transform 0.4s ease;
            border: 1px solid rgba(255,215,0,0.2);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }

        .dialog-overlay.active .dialog-box { transform: scale(1); }

        .dialog-icon { font-size: 44px; margin-bottom: 14px; }
        .dialog-title { font-size: 20px; font-weight: bold; color: var(--accent-gold); margin-bottom: 10px; }
        .dialog-text { font-size: 14px; line-height: 1.7; color: var(--text-secondary); margin-bottom: 22px; }

        .dialog-btn {
            padding: 12px 28px;
            background: linear-gradient(135deg, var(--accent-gold), #ff8c00);
            border: none; border-radius: 12px;
            color: #000; font-size: 15px; font-weight: bold;
            cursor: pointer; transition: all 0.2s;
        }

        .dialog-btn:active { transform: scale(0.96); }

        .dialog-btn-secondary {
            background: rgba(255,255,255,0.08); color: var(--text-primary);
            margin-right: 8px;
        }

        /* ========== 胜利界面 ========== */
        .victory-overlay {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex; align-items: center; justify-content: center;
            z-index: 1001; opacity: 0; visibility: hidden;
            transition: all 0.5s ease;
        }

        .victory-overlay.active { opacity: 1; visibility: visible; }

        .victory-card {
            background: linear-gradient(145deg, #1a1a2e, #0f0f1a);
            padding: 36px; border-radius: 26px;
            text-align: center;
            transform: scale(0.8); transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid rgba(255,215,0,0.3);
            box-shadow: 0 0 80px rgba(255,215,0,0.15);
            max-width: 310px; width: 90%;
        }

        .victory-overlay.active .victory-card { transform: scale(1); }

        .victory-icon {
            font-size: 60px; margin-bottom: 14px;
            animation: victoryBounce 0.6s ease infinite alternate;
        }

        @keyframes victoryBounce {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        .victory-title {
            font-size: 26px; font-weight: bold;
            background: linear-gradient(135deg, var(--accent-gold), var(--color-particle));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        .victory-subtitle { font-size: 13px; color: var(--text-secondary); margin-bottom: 20px; }

        .victory-stats { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
        .victory-stat { text-align: center; }
        .victory-stat-value { font-size: 22px; font-weight: bold; color: var(--accent-gold); }
        .victory-stat-label { font-size: 10px; color: var(--text-secondary); }

        .new-achievement {
            background: rgba(255,215,0,0.08);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 10px; padding: 10px 16px;
            margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
        }

        .new-achievement-icon { font-size: 24px; }
        .new-achievement-text { text-align: left; }
        .new-achievement-name { font-size: 13px; font-weight: bold; color: var(--accent-gold); }
        .new-achievement-desc { font-size: 11px; color: var(--text-secondary); }

        .victory-btns { display: flex; gap: 10px; justify-content: center; }

        .victory-btn {
            padding: 11px 22px; border-radius: 11px;
            font-size: 14px; font-weight: 600;
            cursor: pointer; border: none; transition: all 0.2s;
        }

        .victory-btn-primary {
            background: linear-gradient(135deg, var(--accent-gold), #ff8c00);
            color: #000;
        }

        .victory-btn-secondary {
            background: rgba(255,255,255,0.1); color: var(--text-primary);
        }

        /* 震动效果 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }

        .shake { animation: shake 0.35s ease; }

        /* 脉冲效果 */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255,215,0,0.5); }
            70% { box-shadow: 0 0 0 16px rgba(255,215,0,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,215,0,0); }
        }

        .pulse { animation: pulse 0.5s ease; }

        /* 获得成就弹窗 */
        @keyframes achievementPop {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .achievement-popup {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            background: linear-gradient(145deg, #1a1a2e, #0f0f1a);
            border: 2px solid var(--accent-gold);
            border-radius: 20px; padding: 24px 32px;
            text-align: center; z-index: 2000;
            opacity: 0; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 60px rgba(255,215,0,0.3);
            min-width: 240px;
        }

        .achievement-popup.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .achievement-popup-icon { font-size: 48px; margin-bottom: 10px; display: block; }
        .achievement-popup-title { font-size: 18px; font-weight: bold; color: var(--accent-gold); margin-bottom: 6px; }
        .achievement-popup-desc { font-size: 13px; color: var(--text-secondary); }

        /* 能量不足提示 */
        .energy-warning {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(255,68,68,0.9);
            color: #fff; padding: 12px 20px;
            border-radius: 12px; font-size: 13px;
            z-index: 3000; transition: transform 0.3s ease;
            white-space: nowrap;
        }

        .energy-warning.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <canvas class="particle-bg" id="particle-bg"></canvas>

    <div class="game-container">
        <div class="top-bar">
            <div class="level-badge">
                <div class="level-icon" id="level-icon">⚡</div>
                <div>
                    <div class="level-info" id="level-text">第 1 关</div>
                    <div class="level-name" id="level-name">赫尔墨斯节点</div>
                </div>
            </div>

            <div class="energy-bar">
                <div class="energy-label">
                    <span>⚡</span><span id="energy-label-text">能量</span>
                </div>
                <div class="energy-orbs" id="energy-orbs"></div>
            </div>

            <div class="timer-ring">
                <svg viewBox="0 0 52 52">
                    <circle class="timer-bg" cx="26" cy="26" r="22"/>
                    <circle class="timer-progress" id="timer-circle" cx="26" cy="26" r="22"
                            stroke-dasharray="138.2" stroke-dashoffset="0"/>
                </svg>
                <div class="timer-text" id="timer-text">60</div>
            </div>

            <div class="score-display">
                <div class="score-label">得分</div>
                <div class="score-value" id="score-text">0</div>
            </div>
        </div>

        <div class="game-board" id="game-board">
            <canvas class="board-canvas" id="grid-canvas"></canvas>
            <canvas class="board-canvas" id="path-canvas"></canvas>
            <canvas class="board-canvas" id="input-canvas"></canvas>
            <canvas class="board-canvas" id="fx-canvas"></canvas>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
        </div>

        <div class="controls">
            <button class="ctrl-btn" id="btn-reset">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                    <path d="M3 3v5h5"/>
                </svg>
                重置
            </button>
            <button class="ctrl-btn" id="btn-hint">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
                    <line x1="12" y1="17" x2="12.01" y2="17"/>
                </svg>
                提示
            </button>
        </div>

        <div class="bottom-nav">
            <button class="nav-btn" id="btn-achievements">
                🎖️ 成就<span class="nav-badge" id="ach-badge">0/30</span>
            </button>
            <button class="nav-btn" id="btn-daily">
                📅 每日<span class="nav-badge" id="daily-badge">新</span>
            </button>
            <button class="nav-btn" id="btn-menu">
                ☰ 菜单
            </button>
        </div>

        <div class="level-hint" id="level-hint">
            <strong>引导者低语:</strong>用手指滑动连接所有<strong>赫尔墨斯碎片</strong>
        </div>
    </div>

    <!-- 成就面板 -->
    <div class="panel-overlay" id="ach-panel">
        <div class="panel-box">
            <div class="panel-header">
                <div class="panel-title">🎖️ 成就档案</div>
                <button class="panel-close" id="ach-close">×</button>
            </div>
            <div class="panel-content">
                <div class="achievements-progress" id="ach-progress">已解锁 <span>0/30</span></div>
                <div class="achievement-grid" id="ach-grid"></div>
            </div>
        </div>
    </div>

    <!-- 每日挑战面板 -->
    <div class="panel-overlay" id="daily-panel">
        <div class="panel-box">
            <div class="panel-header">
                <div class="panel-title">📅 每日挑战</div>
                <button class="panel-close" id="daily-close">×</button>
            </div>
            <div class="panel-content">
                <div class="daily-challenge">
                    <div class="daily-header">
                        <div class="daily-title">⚡ 赫尔墨斯试炼</div>
                        <div class="daily-date" id="daily-date">2026-05-16</div>
                    </div>

    // ==================== 游戏主类 ====================
    class OneStrokeGame {
        constructor() {
            // 加载存档
            this.loadProgress();

            // Canvas
            this.gridCanvas = document.getElementById('grid-canvas');
            this.pathCanvas = document.getElementById('path-canvas');
            this.inputCanvas = document.getElementById('input-canvas');
            this.fxCanvas = document.getElementById('fx-canvas');

            this.gridCtx = this.gridCanvas.getContext('2d');
            this.pathCtx = this.pathCanvas.getContext('2d');
            this.fxCtx = this.fxCanvas.getContext('2d');

            // 状态
            this.level = this.s.currentLevel || 1;
            this.score = this.s.score || 0;
            this.timeLeft = 60;
            this.maxTime = 60;
            this.timerInterval = null;
            this.isCompleted = false;
            this.path = [];
            this.solution = [];
            this.obstacles = new Set();
            this.startCell = null;
            this.gridSize = 4;
            this.cellSize = 0;
            this.padding = 0;
            this.theme = 0;

            // 能量系统
            this.energy = this.s.energy || 10;
            this.maxEnergy = 10;
            this.lastEnergyGain = this.s.lastEnergyGain || Date.now();

            // 触摸追踪
            this.isDrawing = false;
            this.lastCell = null;
            this.trailParticles = [];
            this.connectionParticles = [];

            // 特效
            this.particles = [];
            this.flashEffect = null;

            // 每日挑战
            this.isDailyMode = false;
            this.dailyConfig = null;

            // 初始化
            this.setupCanvas();
            this.bindEvents();
            this.updateEnergyDisplay();
            this.updateAchievementsBadge();
            this.updateDailyBadge();
            this.startLevel(this.level);
            this.checkEnergyRecovery();
            this.showIntro();
            this.initBackgroundParticles();
        }

        // ==================== 存档系统 ====================
        getDefaultState() {
            return {
                currentLevel: 1,
                score: 0,
                energy: 10,
                lastEnergyGain: Date.now(),
                achievements: [],
                completedLevels: 0,
                bestTime: 999,
                streak: 0,
                perfectStreak: 0,
                dailyCount: 0,
                dailyLastDate: null,
                dailyBestTime: 999,
                totalScore: 0,
                totalRetries: 0,
                totalHints: 0,
                noHintStreak: 0,
                minEnergyUsed: 999,
                totalEnergySaved: 0,
                themesUsed: new Set(),
                revivedFromEmpty: false
            };
        }

        loadProgress() {
            try {
                const saved = localStorage.getItem('rustEpoch_onestroke_v3');
                if (saved) {
                    const data = JSON.parse(saved);
                    this.s = { ...this.getDefaultState(), ...data };
                    // 转换Set
                    if (data.themesUsed && Array.isArray(data.themesUsed)) {
                        this.s.themesUsed = new Set(data.themesUsed);
                    }
                } else {
                    this.s = this.getDefaultState();
                }
            } catch(e) {
                this.s = this.getDefaultState();
            }
        }

        saveProgress() {
            try {
                const data = { ...this.s };
                if (data.themesUsed instanceof Set) {
                    data.themesUsed = Array.from(data.themesUsed);
                }
                localStorage.setItem('rustEpoch_onestroke_v3', JSON.stringify(data));
            } catch(e) {}
        }

        // ==================== 能量系统 ====================
        checkEnergyRecovery() {
            const now = Date.now();
            const elapsed = now - this.lastEnergyGain;
            const recoveryInterval = 30 * 60 * 1000; // 30分钟恢复1点

            if (this.energy < this.maxEnergy) {
                const recovered = Math.floor(elapsed / recoveryInterval);
                if (recovered > 0) {
                    const actualRecovered = Math.min(recovered, this.maxEnergy - this.energy);
                    this.energy += actualRecovered;
                    this.lastEnergyGain = now - (elapsed % recoveryInterval);
                    this.updateEnergyDisplay();
                    this.saveProgress();
                }
            }

            // 每分钟检查一次
            setTimeout(() => this.checkEnergyRecovery(), 60000);
        }

        consumeEnergy(amount = 1) {
            if (this.energy <= 0) {
                this.showEnergyWarning();
                return false;
            }
            this.energy -= amount;
            this.updateEnergyDisplay();
            return true;
        }

        gainEnergy(amount) {
            const oldEnergy = this.energy;
            this.energy = Math.min(this.maxEnergy, this.energy + amount);
            const actualGain = this.energy - oldEnergy;

            if (this.energy < this.maxEnergy) {
                this.lastEnergyGain = Date.now();
            }

            this.updateEnergyDisplay();
            return actualGain;
        }

        updateEnergyDisplay() {
            const orbsContainer = document.getElementById('energy-orbs');
            const labelText = document.getElementById('energy-label-text');

            let html = '';
            for (let i = 0; i < this.maxEnergy; i++) {
                const isFull = i < this.energy;
                const color = this.energy <= 3 ? 'low' : this.energy <= 6 ? 'mid' : 'full';
                html += `<div class="energy-orb ${isFull ? color : ''}"></div>`;
            }
            orbsContainer.innerHTML = html;
            labelText.textContent = `能量 ${this.energy}/${this.maxEnergy}`;
        }

        showEnergyWarning() {
            const warning = document.getElementById('energy-warning');
            warning.classList.add('show');
            setTimeout(() => warning.classList.remove('show'), 3000);
        }

        // ==================== 成就系统 ====================
        checkAchievements(cause = '') {
            const newlyUnlocked = [];

            ACHIEVEMENTS.forEach(ach => {
                if (!this.s.achievements.includes(ach.id)) {
                    if (ach.condition(this.s)) {
                        this.s.achievements.push(ach.id);
                        newlyUnlocked.push(ach);
                    }
                }
            });

            if (newlyUnlocked.length > 0) {
                this.saveProgress();
                this.updateAchievementsBadge();
                this.showAchievementPopup(newlyUnlocked[0]);
            }
        }

        showAchievementPopup(ach) {
            const popup = document.getElementById('ach-popup');
            const icon = document.getElementById('popup-icon');
            const title = document.getElementById('popup-title');
            const desc = document.getElementById('popup-desc');

            icon.textContent = ach.icon;
            title.textContent = ach.name;
            desc.textContent = ach.desc;

            popup.classList.add('show');
            setTimeout(() => popup.classList.remove('show'), 2500);
        }

        updateAchievementsBadge() {
            const count = this.s.achievements.length;
            document.getElementById('ach-badge').textContent = `${count}/30`;
        }

        showAchievementsPanel() {
            const panel = document.getElementById('ach-panel');
            const grid = document.getElementById('ach-grid');
            const progress = document.getElementById('ach-progress');

            progress.innerHTML = `已解锁 <span>${this.s.achievements.length}/30</span>`;

            let html = '';
            ACHIEVEMENTS.forEach(ach => {
                const unlocked = this.s.achievements.includes(ach.id);
                html += `
                    <div class="achievement-item ${unlocked ? 'unlocked' : ''}" title="${ach.desc}">
                        <span class="achievement-icon">${ach.icon}</span>
                        <div class="achievement-name">${ach.name}</div>
                        <div class="achievement-lock">${unlocked ? '✓' : '🔒'}</div>
                    </div>
                `;
            });
            grid.innerHTML = html;
            panel.classList.add('active');
        }

        updateDailyBadge() {
            const today = new Date().toISOString().split('T')[0];
            const badge = document.getElementById('daily-badge');
            if (this.s.dailyLastDate === today && this.s.dailyCompleted) {
                badge.textContent = '✓';
            } else {
                badge.textContent = '新';
            }
        }

        // ==================== 每日挑战 ====================
        generateDailyChallenge() {
            const today = new Date();
            const seed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();

            // 基于日期生成固定关卡
            const rng = this.seededRandom(seed);
            const sizes = [7, 8, 9];
            const gridSize = sizes[Math.floor(rng() * sizes.length)];
            const obstacleRatio = 0.3 + rng() * 0.35; // 30%-65%
            const obstacles = Math.floor(gridSize * gridSize * obstacleRatio);

            this.dailyConfig = {
                gridSize,
                obstacles,
                theme: Math.floor(rng() * 5),
                time: 60 + Math.floor(rng() * 60),
                baseScore: 200 + Math.floor(rng() * 200)
            };
        }

        seededRandom(seed) {
            let s = seed;
            return () => {
                s = (s * 1103515245 + 12345) & 0x7fffffff;
                return s / 0x7fffffff;
            };
        }

        startDailyChallenge() {
            this.hidePanel('daily-panel');
            this.generateDailyChallenge();

            const config = this.dailyConfig;
            this.isDailyMode = true;
            this.isCompleted = false;
            this.path = [];
            this.timeLeft = config.time;
            this.maxTime = config.time;
            this.gridSize = config.gridSize;
            this.theme = config.theme;

            this.padding = this.boardSize * 0.05;
            const usableSize = this.boardSize - this.padding * 2;
            this.cellSize = usableSize / this.gridSize;

            this.generateSolvablePuzzle(config);
            this.updateUI();
            this.render();
            this.startTimer();

            this.applyTheme(config.theme);
            this.showLevelHint();
        }

        completeDailyChallenge() {
            const today = new Date().toISOString().split('T')[0];
            this.s.dailyCount++;
            this.s.dailyLastDate = today;
            this.s.dailyCompleted = true;

            if (this.timeLeft < this.s.dailyBestTime) {
                this.s.dailyBestTime = this.timeLeft;
            }

            this.updateDailyBadge();
            this.saveProgress();
            this.checkAchievements('daily');
        }

        showDailyPanel() {
            const panel = document.getElementById('daily-panel');
            const today = new Date().toISOString().split('T')[0];
            const isCompleted = this.s.dailyLastDate === today;

            document.getElementById('daily-date').textContent = today;
            document.getElementById('daily-best').textContent =
                this.s.dailyBestTime < 999 ? `${this.s.dailyBestTime}秒` : '--';
            document.getElementById('daily-count').textContent = this.s.dailyCount;

            const btn = document.getElementById('daily-start-btn');
            if (isCompleted) {
                btn.textContent = '已完成 ✓';
                btn.classList.add('completed');
                btn.disabled = true;
            } else {
                btn.textContent = '开始挑战';
                btn.classList.remove('completed');
                btn.disabled = false;
            }

            panel.classList.add('active');
        }

        hidePanel(id) {
            document.getElementById(id).classList.remove('active');
        }

        // ==================== Canvas 设置 ====================
        setupCanvas() {
            const board = document.getElementById('game-board');
            const size = board.clientWidth;

            [this.gridCanvas, this.pathCanvas, this.inputCanvas, this.fxCanvas].forEach(canvas => {
                const dpr = window.devicePixelRatio || 2;
                canvas.width = size * dpr;
                canvas.height = size * dpr;
                canvas.style.width = size + 'px';
                canvas.style.height = size + 'px';
                const ctx = canvas.getContext('2d');
                ctx.scale(dpr, dpr);
            });

            this.boardSize = size;
        }

        initBackgroundParticles() {
            const canvas = document.getElementById('particle-bg');
            const ctx = canvas.getContext('2d');

            const resize = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            };
            resize();
            window.addEventListener('resize', resize);

            this.bgParticles = [];
            for (let i = 0; i < 40; i++) {
                this.bgParticles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speedX: (Math.random() - 0.5) * 0.4,
                    speedY: (Math.random() - 0.5) * 0.4,
                    alpha: Math.random() * 0.4 + 0.1
                });
            }

            const animate = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                this.bgParticles.forEach(p => {
                    p.x += p.speedX; p.y += p.speedY;
                    if (p.x < 0) p.x = canvas.width;
                    if (p.x > canvas.width) p.x = 0;
                    if (p.y < 0) p.y = canvas.height;
                    if (p.y > canvas.height) p.y = 0;

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255,215,0,${p.alpha})`;
                    ctx.fill();
                });
                requestAnimationFrame(animate);
            };
            animate();
        }

        // ==================== 事件绑定 ====================
        bindEvents() {
            const canvas = this.inputCanvas;

            canvas.addEventListener('mousedown', e => this.handleStart(e));
            canvas.addEventListener('mousemove', e => this.handleMove(e));
            canvas.addEventListener('mouseup', () => this.handleEnd());
            canvas.addEventListener('mouseleave', () => this.handleEnd());

            canvas.addEventListener('touchstart', e => { e.preventDefault(); this.handleStart(e.touches[0]); }, { passive: false });
            canvas.addEventListener('touchmove', e => { e.preventDefault(); this.handleMove(e.touches[0]); }, { passive: false });
            canvas.addEventListener('touchend', e => { e.preventDefault(); this.handleEnd(); }, { passive: false });

            document.getElementById('btn-reset').addEventListener('click', () => this.resetLevel());
            document.getElementById('btn-hint').addEventListener('click', () => this.showHint());

            document.getElementById('btn-replay').addEventListener('click', () => this.replay());
            document.getElementById('btn-next').addEventListener('click', () => this.nextLevel());
            document.getElementById('dialog-btn').addEventListener('click', () => this.closeDialog());

            document.getElementById('btn-achievements').addEventListener('click', () => this.showAchievementsPanel());
            document.getElementById('btn-daily').addEventListener('click', () => this.showDailyPanel());
            document.getElementById('btn-menu').addEventListener('click', () => this.showMenu());

            document.getElementById('ach-close').addEventListener('click', () => this.hidePanel('ach-panel'));
            document.getElementById('daily-close').addEventListener('click', () => this.hidePanel('daily-panel'));

            window.addEventListener('resize', () => {
                this.setupCanvas();
                this.render();
            });
        }

        getEventPos(e) {
            const rect = this.inputCanvas.getBoundingClientRect();
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }

        posToCell(x, y) {
            const padding = this.padding;
            const usableSize = this.boardSize - padding * 2;
            const cellSize = usableSize / this.gridSize;

            const col = Math.floor((x - padding) / cellSize);
            const row = Math.floor((y - padding) / cellSize);

            return { r: row, c: col };
        }

        cellToPos(r, c) {
            return {
                x: this.padding + c * this.cellSize + this.cellSize / 2,
                y: this.padding + r * this.cellSize + this.cellSize / 2
            };
        }

        // ==================== 输入处理 ====================
        handleStart(e) {
            if (this.isCompleted) return;
            if (this.energy <= 0) { this.showEnergyWarning(); return; }

            const pos = this.getEventPos(e);
            const cell = this.posToCell(pos.x, pos.y);

            if (!this.isValidCell(cell.r, cell.c)) return;

            if (this.path.length === 0) {
                if (cell.r === this.startCell.r && cell.c === this.startCell.c) {
                    this.consumeEnergy();
                    this.isDrawing = true;
                    this.path.push({ r: cell.r, c: cell.c });
                    this.lastCell = cell;
                    this.addConnectionParticle(pos.x, pos.y);
                    this.render();
                    this.updateUI();
                }
            } else {
                const last = this.path[this.path.length - 1];
                if (cell.r === last.r && cell.c === last.c) {
                    this.isDrawing = true;
                    this.lastCell = cell;
                }
            }
        }

        handleMove(e) {
            if (!this.isDrawing || this.isCompleted) return;

            const pos = this.getEventPos(e);
            const cell = this.posToCell(pos.x, pos.y);

            if (!this.isValidCell(cell.r, cell.c)) return;

            const last = this.path[this.path.length - 1];
            const isAdjacent = Math.abs(cell.r - last.r) + Math.abs(cell.c - last.c) === 1;

            if (!isAdjacent) return;
            if (this.isVisited(cell)) return;

            this.path.push({ r: cell.r, c: cell.c });
            this.lastCell = cell;
            this.addConnectionParticle(pos.x, pos.y);
            this.render();
            this.updateUI();

            this.checkWin();
        }

        handleEnd() {
            this.isDrawing = false;
            this.lastCell = null;
        }

        isValidCell(r, c) {
            if (r < 0 || r >= this.gridSize || c < 0 || c >= this.gridSize) return false;
            return !this.obstacles.has(`${r},${c}`);
        }

        isVisited(cell) {
            return this.path.some(p => p.r === cell.r && p.c === cell.c);
        }

        addConnectionParticle(x, y) {
            this.connectionParticles.push({
                x, y,
                vx: (Math.random() - 0.5) * 3,
                vy: (Math.random() - 0.5) * 3,
                alpha: 1,
                size: this.cellSize * 0.15
            });
        }

        // ==================== 关卡生成 ====================
        startLevel(level) {
            this.level = level;
            this.isDailyMode = false;
            const config = LEVELS[level - 1] || LEVELS[LEVELS.length - 1];

            this.gridSize = config.gridSize;
            this.theme = config.theme;
            this.timeLeft = config.time;
            this.maxTime = config.time;
            this.path = [];
            this.isCompleted = false;

            this.padding = this.boardSize * 0.05;
            const usableSize = this.boardSize - this.padding * 2;
            this.cellSize = usableSize / this.gridSize;

            this.generateSolvablePuzzle(config);
            this.updateUI();
            this.render();
            this.startTimer();
            this.applyTheme(config.theme);
            this.showLevelHint();

            this.s.themesUsed.add(config.theme);
        }

        generateSolvablePuzzle(config) {
            const totalCells = this.gridSize * this.gridSize;
            const pathLength = totalCells - config.obstacles;

            // 步骤1：生成蛇形骨架（访问所有格子）
            const fullSnakePath = this.generateSnakePath();

            // 步骤2：随机旋转+镜像打乱（让路径不再固定规律）
            const shuffledPath = this.randomizeSnakePath([...fullSnakePath]);

            // 步骤3：前 pathLength 格作为可行路径
            this.solution = shuffledPath.slice(0, pathLength);


            // 步骤4：剩余格子作为障碍物（障碍物永不在路径上，保证有解）
            this.obstacles = new Set();
            for (let i = pathLength; i < shuffledPath.length; i++) {
                this.obstacles.add(`${shuffledPath[i].r},${shuffledPath[i].c}`);
            }

            // 步骤5：起点和终点
            this.startCell = this.solution[0];
        }


        // 随机旋转+镜像打乱蛇形路径（90度旋转 + 水平翻转）
        randomizeSnakePath(path) {
            let rotation = Math.floor(Math.random() * 4); // 0/1/2/3 次 90度
            const mirrored = Math.random() < 0.5;
            const size = this.gridSize;
            return path.map(cell => {
                let { r, c } = cell;
                // 旋转
                for (let i = 0; i < rotation; i++) {
                    const tmp = r; r = c; c = size - 1 - tmp;
                }
                // 水平翻转
                if (mirrored) c = size - 1 - c;
                return { r, c };
            });
        }

        generateSnakePath() {
            const path = [];
            for (let r = 0; r < this.gridSize; r++) {
                if (r % 2 === 0) {
                    for (let c = 0; c < this.gridSize; c++) path.push({ r, c });
                } else {
                    for (let c = this.gridSize - 1; c >= 0; c--) path.push({ r, c });
                }
            }
            return path;
        }

        // ==================== 渲染 ====================
        render() {
            this.drawGrid();
            this.drawPath();
            this.drawConnectionParticles();
        }

        drawGrid() {
            const ctx = this.gridCtx;
            const size = this.boardSize;
            const theme = WORLD_CONFIG.themeColors[this.theme] || WORLD_CONFIG.themeColors[0];

            ctx.clearRect(0, 0, size, size);
            ctx.fillStyle = theme.bg;
            ctx.fillRect(0, 0, size, size);

            for (let r = 0; r < this.gridSize; r++) {
                for (let c = 0; c < this.gridSize; c++) {
                    if (this.obstacles.has(`${r},${c}`)) continue;

                    const x = this.padding + c * this.cellSize;
                    const y = this.padding + r * this.cellSize;

                    ctx.fillStyle = theme.cell;
                    ctx.beginPath();
                    ctx.roundRect(x + 2, y + 2, this.cellSize - 4, this.cellSize - 4, 5);
                    ctx.fill();

                    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
                    ctx.lineWidth = 0.8;
                    ctx.stroke();
                }
            }

            // 起点
            if (this.startCell) {
                const pos = this.cellToPos(this.startCell.r, this.startCell.c);
                const gradient = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, this.cellSize * 0.5);
                gradient.addColorStop(0, `${theme.start}66`);
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, this.cellSize * 0.5, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = theme.start;
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, this.cellSize * 0.18, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#fff';
                ctx.font = `bold ${this.cellSize * 0.22}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('起', pos.x, pos.y);
            }

            // 已访问格子高亮
            this.path.forEach((cell, index) => {
                const pos = this.cellToPos(cell.r, cell.c);
                const alpha = Math.min(0.5, 0.2 + index * 0.015);
                const gradient = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, this.cellSize * 0.4);
                gradient.addColorStop(0, `${theme.accent}${Math.floor(alpha * 255).toString(16).padStart(2, '0')}`);
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.fillRect(pos.x - this.cellSize / 2, pos.y - this.cellSize / 2, this.cellSize, this.cellSize);
            });
        }

        drawPath() {
            const ctx = this.pathCtx;
            const size = this.boardSize;
            const theme = WORLD_CONFIG.themeColors[this.theme] || WORLD_CONFIG.themeColors[0];

            ctx.clearRect(0, 0, size, size);
            if (this.path.length < 2) return;

            ctx.strokeStyle = theme.path;
            ctx.lineWidth = this.cellSize * 0.18;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            // 发光
            ctx.shadowColor = theme.path;
            ctx.shadowBlur = this.cellSize * 0.15;

            ctx.beginPath();
            this.path.forEach((cell, i) => {
                const pos = this.cellToPos(cell.r, cell.c);
                if (i === 0) ctx.moveTo(pos.x, pos.y);
                else ctx.lineTo(pos.x, pos.y);
            });
            ctx.stroke();
            ctx.shadowBlur = 0;

            // 节点
            // 起点
            const startPos = this.cellToPos(this.path[0].r, this.path[0].c);
            const sGrad = ctx.createRadialGradient(startPos.x, startPos.y, 0, startPos.x, startPos.y, this.cellSize * 0.25);
            sGrad.addColorStop(0, theme.start); sGrad.addColorStop(1, 'transparent');
            ctx.fillStyle = sGrad;
            ctx.beginPath(); ctx.arc(startPos.x, startPos.y, this.cellSize * 0.25, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = theme.start;
            ctx.beginPath(); ctx.arc(startPos.x, startPos.y, this.cellSize * 0.09, 0, Math.PI * 2); ctx.fill();

            // 终点（笔尖）
            if (this.path.length > 1) {
                const last = this.path[this.path.length - 1];
                const lPos = this.cellToPos(last.r, last.c);
                const lGrad = ctx.createRadialGradient(lPos.x, lPos.y, 0, lPos.x, lPos.y, this.cellSize * 0.3);
                lGrad.addColorStop(0, theme.accent); lGrad.addColorStop(1, 'transparent');
                ctx.fillStyle = lGrad;
                ctx.beginPath(); ctx.arc(lPos.x, lPos.y, this.cellSize * 0.3, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = theme.accent;
                ctx.beginPath(); ctx.arc(lPos.x, lPos.y, this.cellSize * 0.09, 0, Math.PI * 2); ctx.fill();
            }
        }

        drawConnectionParticles() {
            const ctx = this.fxCtx;
            const size = this.boardSize;

            ctx.clearRect(0, 0, size, size);

            this.connectionParticles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= 0.04;
                p.size *= 0.96;

                if (p.alpha <= 0) {
                    this.connectionParticles.splice(i, 1);
                    return;
                }

                const theme = WORLD_CONFIG.themeColors[this.theme] || WORLD_CONFIG.themeColors[0];
                const alphaHex = Math.floor(p.alpha * 255).toString(16).padStart(2, "0");
                const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
                gradient.addColorStop(0, theme.path + alphaHex);
                gradient.addColorStop(1, "transparent");

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        drawGrid() {
            const ctx = this.gridCtx;
            const size = this.boardSize;
            const theme = WORLD_CONFIG.themeColors[this.theme] || WORLD_CONFIG.themeColors[0];

            ctx.clearRect(0, 0, size, size);
            ctx.fillStyle = theme.bg;
            ctx.fillRect(0, 0, size, size);

            for (let r = 0; r < this.gridSize; r++) {
                for (let c = 0; c < this.gridSize; c++) {
                    if (this.obstacles.has(`${r},${c}`)) continue;

                    const x = this.padding + c * this.cellSize;
                    const y = this.padding + r * this.cellSize;

                    ctx.fillStyle = theme.cell;
                    ctx.beginPath();
                    ctx.roundRect(x + 2, y + 2, this.cellSize - 4, this.cellSize - 4, 5);
                    ctx.fill();

                    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
                    ctx.lineWidth = 0.8;
                    ctx.stroke();
                }
            }

            // 起点
            if (this.startCell) {
                const pos = this.cellToPos(this.startCell.r, this.startCell.c);
                const gradient = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, this.cellSize * 0.5);
                gradient.addColorStop(0, `${theme.start}66`);
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, this.cellSize * 0.5, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = theme.start;
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, this.cellSize * 0.18, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#fff';
                ctx.font = `bold ${this.cellSize * 0.22}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('起', pos.x, pos.y);
            }

            // 已访问格子高亮
            this.path.forEach((cell, index) => {
                const pos = this.cellToPos(cell.r, cell.c);
                const alpha = Math.min(0.5, 0.2 + index * 0.015);
                const gradient = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, this.cellSize * 0.4);
                gradient.addColorStop(0, `${theme.accent}${Math.floor(alpha * 255).toString(16).padStart(2, '0')}`);
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.fillRect(pos.x - this.cellSize / 2, pos.y - this.cellSize / 2, this.cellSize, this.cellSize);
            });
        }

        drawPath() {
            const ctx = this.pathCtx;
            const size = this.boardSize;
            const theme = WORLD_CONFIG.themeColors[this.theme] || WORLD_CONFIG.themeColors[0];

            ctx.clearRect(0, 0, size, size);
            if (this.path.length < 2) return;

            ctx.strokeStyle = theme.path;
            ctx.lineWidth = this.cellSize * 0.18;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            // 发光
            ctx.shadowColor = theme.path;
            ctx.shadowBlur = this.cellSize * 0.15;

            ctx.beginPath();
            this.path.forEach((cell, i) => {
                const pos = this.cellToPos(cell.r, cell.c);
                if (i === 0) ctx.moveTo(pos.x, pos.y);
                else ctx.lineTo(pos.x, pos.y);
            });
            ctx.stroke();
            ctx.shadowBlur = 0;

            // 节点
            this.path.forEach((cell, i) => {
                const pos = this.cellToPos(cell.r, cell.c);
                const isStart = i === 0;

                const gradient = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, this.cellSize * 0.25);
                gradient.addColorStop(0, isStart ? theme.start : theme.path);
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, this.cellSize * 0.25, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = isStart ? theme.start : theme.path;
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, this.cellSize * 0.09, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        drawConnectionParticles() {
            const ctx = this.fxCtx;
            const size = this.boardSize;

            ctx.clearRect(0, 0, size, size);

            this.connectionParticles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy;
                p.alpha -= 0.04;
                p.size *= 0.96;

                if (p.alpha <= 0) {
                    this.connectionParticles.splice(i, 1);
                    return;
                }

                const theme = WORLD_CONFIG.themeColors[this.theme] || WORLD_CONFIG.themeColors[0];
                const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
                gradient.addColorStop(0, `${theme.path}${Math.floor(p.alpha * 255).toString(16).padStart(2, '0')}`);
                gradient.addColorStop(1, 'transparent');

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        applyTheme(themeIndex) {
            document.getElementById('level-icon').textContent = WORLD_CONFIG.levels[Math.min(themeIndex, WORLD_CONFIG.levels.length - 1)].icon;
        }

        // ==================== 游戏逻辑 ====================
        checkWin() {
            const totalCells = this.gridSize * this.gridSize - this.obstacles.size;

            if (this.path.length === totalCells) {
                this.isCompleted = true;
                clearInterval(this.timerInterval);

                const timeSpent = this.maxTime - this.timeLeft;
                const timeBonus = this.timeLeft * 2;
                const baseScore = this.isDailyMode ? this.dailyConfig.baseScore : LEVELS[this.level - 1].baseScore;
                const roundScore = baseScore + timeBonus;

                this.score += roundScore;

                // 统计更新
                const prevCompleted = this.s.completedLevels;

                if (!this.isDailyMode) {
                    this.s.completedLevels = Math.max(this.s.completedLevels, this.level);
                    this.s.bestTime = Math.min(this.s.bestTime, timeSpent);
                    this.s.streak++;
                    this.s.perfectStreak++;
                    this.s.totalScore += roundScore;
                    this.s.noHintStreak++;

                    if (this.level >= this.s.currentLevel && this.level < 30) {
                        this.s.currentLevel = this.level + 1;
                    }
                }

                // 能量奖励
                const energyGained = this.gainEnergy(2);
                this.s.totalEnergySaved += energyGained;
                if (energyGained > 0) this.s.minEnergyUsed = Math.min(this.s.minEnergyUsed, 1);

                // 完成每日
                if (this.isDailyMode) {
                    this.completeDailyChallenge();
                }

                this.saveProgress();
                this.checkAchievements('complete');
                this.showVictory(roundScore, timeSpent);
            }
        }

        resetLevel() {
            if (this.isCompleted) return;
            if (this.energy <= 0) { this.showEnergyWarning(); return; }

            this.s.totalRetries++;
            this.s.perfectStreak = 0;
            this.s.noHintStreak = 0;

            this.path = [];
            this.connectionParticles = [];
            this.render();
            this.updateUI();
            this.saveProgress();

            document.getElementById('game-board').classList.add('shake');
            setTimeout(() => document.getElementById('game-board').classList.remove('shake'), 350);
        }

        showHint() {
            if (this.isCompleted) return;
            if (this.s.noHintStreak > 0) this.s.noHintStreak = 0;
            this.s.totalHints++;

            const board = document.getElementById('game-board');
            board.classList.add('pulse');
            setTimeout(() => board.classList.remove('pulse'), 500);

            const ctx = this.pathCtx;
            const size = this.boardSize;
            const theme = WORLD_CONFIG.themeColors[this.theme] || WORLD_CONFIG.themeColors[0];

            this.pathCtx.clearRect(0, 0, size, size);
            this.drawPath();

            if (this.solution.length > 0) {
                ctx.strokeStyle = `${theme.path}40`;
                ctx.lineWidth = this.cellSize * 0.1;
                ctx.setLineDash([6, 6]);

                ctx.beginPath();
                this.solution.forEach((cell, i) => {
                    const pos = this.cellToPos(cell.r, cell.c);
                    if (i === 0) ctx.moveTo(pos.x, pos.y);
                    else ctx.lineTo(pos.x, pos.y);
                });
                ctx.stroke();
                ctx.setLineDash([]);
            }

            setTimeout(() => {
                this.pathCtx.clearRect(0, 0, size, size);
                this.drawPath();
            }, 2000);

            this.saveProgress();
        }

        replay() {
            this.hideVictory();
            this.s.perfectStreak = 0;
            this.s.streak = Math.max(0, this.s.streak - 1);
            this.saveProgress();
            this.startLevel(this.level);
        }

        nextLevel() {
            this.hideVictory();
            if (this.level < 30) {
                this.startLevel(this.level + 1);
            } else {
                this.showEnding();
            }
        }

        // ==================== UI更新 ====================
        updateUI() {
            const totalCells = this.gridSize * this.gridSize - this.obstacles.size;
            const config = this.isDailyMode ? this.dailyConfig : LEVELS[this.level - 1];

            document.getElementById('level-text').textContent = this.isDailyMode ? '📅 每日挑战' : `第 ${this.level} 关`;
            document.getElementById('level-name').textContent = this.isDailyMode
                ? '赫尔墨斯试炼'
                : WORLD_CONFIG.levels[Math.floor((this.level - 1) / 3) % WORLD_CONFIG.levels.length].name;
            document.getElementById('score-text').textContent = this.score;
            document.getElementById('timer-text').textContent = this.timeLeft;

            const progress = (this.path.length / totalCells) * 100;
            document.getElementById('progress-fill').style.width = `${progress}%`;

            const circumference = 138.2; // 2 * PI * 22
            const offset = circumference * (1 - this.timeLeft / this.maxTime);
            document.getElementById('timer-circle').style.strokeDashoffset = offset;

            const timerCircle = document.getElementById('timer-circle');
            if (this.timeLeft <= 10) timerCircle.style.stroke = '#ff4444';
            else if (this.timeLeft <= 20) timerCircle.style.stroke = '#ffaa00';
            else timerCircle.style.stroke = WORLD_CONFIG.themeColors[this.theme]?.accent || 'var(--accent-gold)';
        }

        startTimer() {
            clearInterval(this.timerInterval);
            this.timerInterval = setInterval(() => {
                this.timeLeft--;
                this.updateUI();

                if (this.timeLeft <= 0) {
                    clearInterval(this.timerInterval);
                    this.gameOver();
                }
            }, 1000);
        }

        gameOver() {
            this.isCompleted = true;
            this.s.streak = 0;
            this.s.perfectStreak = 0;

            if (this.energy <= 0) {
                this.s.revivedFromEmpty = true;
            }

            this.saveProgress();
            this.checkAchievements('timeout');

            document.getElementById('victory-subtitle').textContent = '时间耗尽，能量消散...';
            document.getElementById('victory-time').textContent = '--';
            document.getElementById('victory-score').textContent = this.score;
            document.getElementById('new-achievement').style.display = 'none';

            const btnNext = document.getElementById('btn-next');
            btnNext.textContent = this.isDailyMode ? '重试' : '重新挑战';
            btnNext.onclick = () => {
                this.hideVictory();
                if (this.isDailyMode) {
                    this.startDailyChallenge();
                } else {
                    this.replay();
                }
            };

            document.getElementById('victory-overlay').classList.add('active');
        }

        showVictory(roundScore, timeSpent) {
            const messages = WORLD_CONFIG.victoryMessages;
            document.getElementById('victory-title').textContent = this.isDailyMode ? '试炼完成' : '觉醒成功';
            document.getElementById('victory-subtitle').textContent = this.isDailyMode
                ? '赫尔墨斯试炼通过！'
                : messages[(this.level - 1) % messages.length];
            document.getElementById('victory-time').textContent = `${timeSpent}秒`;
            document.getElementById('victory-score').textContent = `+${roundScore}`;

            // 检查新成就
            const newAch = ACHIEVEMENTS.find(ach =>
                !this.s.achievements.includes(ach.id) && ach.condition(this.s)
            );
            if (newAch) {
                document.getElementById('new-achievement').style.display = 'flex';
                document.getElementById('new-ach-icon').textContent = newAch.icon;
                document.getElementById('new-ach-name').textContent = newAch.name;
                document.getElementById('new-ach-desc').textContent = newAch.desc;
            } else {
                document.getElementById('new-achievement').style.display = 'none';
            }

            const btnNext = document.getElementById('btn-next');
            if (this.isDailyMode) {
                btnNext.textContent = '完成 ✓';
                btnNext.onclick = () => {
                    this.hideVictory();
                    this.showDailyPanel();
                };
            } else {
                btnNext.textContent = this.level < 30 ? '下一关' : '查看结局';
                btnNext.onclick = () => this.nextLevel();
            }

            document.getElementById('victory-overlay').classList.add('active');

            // 胜利粒子
            this.spawnVictoryParticles();
        }

        spawnVictoryParticles() {
            const fx = this.fxCtx;
            const size = this.boardSize;
            const cx = size / 2, cy = size / 2;
            const theme = WORLD_CONFIG.themeColors[this.theme] || WORLD_CONFIG.themeColors[0];

            for (let i = 0; i < 40; i++) {
                const angle = (Math.PI * 2 * i) / 40;
                const speed = 2 + Math.random() * 3;
                this.connectionParticles.push({
                    x: cx, y: cy,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    alpha: 1,
                    size: this.cellSize * 0.12
                });
            }
        }

        hideVictory() {
            document.getElementById('victory-overlay').classList.remove('active');
        }

        showLevelHint() {
            const levelIndex = Math.floor((this.level - 1) / 3) % WORLD_CONFIG.levels.length;
            const worldLevel = WORLD_CONFIG.levels[levelIndex];
            const hintEl = document.getElementById('level-hint');

            if (this.isDailyMode) {
                hintEl.innerHTML = `<strong>📅 每日挑战:</strong>与全球玩家同台竞技，争夺最快速度！`;
            } else if (worldLevel.story && this.level > 1) {
                hintEl.innerHTML = `<strong>${worldLevel.icon} ${worldLevel.name}:</strong>${worldLevel.story}`;
            } else {
                hintEl.innerHTML = `<strong>引导者低语:</strong>${worldLevel.hint}`;
            }
        }

        showIntro() {
            const dialog = document.getElementById('story-dialog');
            const btn = document.getElementById('dialog-btn');
            const btnContainer = document.getElementById('dialog-btns');

            document.getElementById('dialog-icon').textContent = '🌌';
            document.getElementById('dialog-title').textContent = '末日锈纪';
            document.getElementById('dialog-text').textContent =
                '2500年，赫尔墨斯粒子的光芒已经黯淡。三方势力的战争让地球沉默了太久。是时候让碎片重新连接，让能量再次流动...';

            btn.textContent = '开始觉醒';
            btnContainer.innerHTML = '<button class="dialog-btn" id="dialog-btn" onclick="game.closeDialog()">开始觉醒</button>';
            dialog.classList.add('active');
        }

        closeDialog() {
            document.getElementById('story-dialog').classList.remove('active');
        }

        showEnding() {
            const dialog = document.getElementById('story-dialog');
            const btnContainer = document.getElementById('dialog-btns');

            document.getElementById('dialog-icon').textContent = '✨';
            document.getElementById('dialog-title').textContent = '觉醒完成';
            document.getElementById('dialog-text').textContent =
                '所有赫尔墨斯碎片已经重新连接，能量网络全面激活。回光者和散铁的遗骸发出最后的光芒... 新的时代即将开始。';

            btnContainer.innerHTML =
                '<button class="dialog-btn dialog-btn-secondary" onclick="game.closeDialog(); game.score=0; game.s.currentLevel=1;">重新开始</button>' +
                '<button class="dialog-btn" onclick="game.closeDialog()">自由探索</button>';

            dialog.classList.add('active');
        }

        showMenu() {
            const dialog = document.getElementById('story-dialog');
            const btnContainer = document.getElementById('dialog-btns');

            document.getElementById('dialog-icon').textContent = '☰';
            document.getElementById('dialog-title').textContent = '游戏菜单';
            document.getElementById('dialog-text').innerHTML =
                `<div style="text-align:left; font-size:13px; line-height:2;">` +
                `⚡ 当前能量: ${this.energy}/${this.maxEnergy}<br>` +
                `🎖️ 已解锁成就: ${this.s.achievements.length}/30<br>` +
                `📅 每日挑战: ${this.s.dailyCount}次完成<br>` +
                `🔥 当前连胜: ${this.s.streak}关<br>` +
                `⭐ 最高关卡: ${this.s.completedLevels}/30<br>` +
                `💰 总得分: ${this.s.totalScore}<br>` +
                `⏱️ 最佳时间: ${this.s.bestTime < 999 ? this.s.bestTime + '秒' : '--'}` +
                `</div>`;

            btnContainer.innerHTML =
                '<button class="dialog-btn" onclick="game.closeDialog(); game.startLevel(1);">回到第1关</button>' +
                '<button class="dialog-btn dialog-btn-secondary" onclick="game.closeDialog()">关闭</button>';

            dialog.classList.add('active');
        }
    }

    // ==================== 启动游戏 ====================
    let game;
    window.addEventListener('load', () => {
        game = new OneStrokeGame();
    });

    document.addEventListener('touchmove', e => {
        if (e.target.closest('#game-board')) e.preventDefault();
    }, { passive: false });
    </script>
</body>
</html>
